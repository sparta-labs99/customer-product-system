<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="common/fragments :: common-head">
</head>
<body class="sb-nav-fixed">

<nav th:replace="common/fragments :: top-nav"></nav>

<div id="layoutSidenav">
    <div th:replace="common/fragments :: side-nav"></div>

    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <h1 class="mt-4 mb-4">상품 관리</h1>
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row mb-3 align-items-center">

                            <!-- 왼쪽: 순수 관측 영역 (갯수 선택 & 카운터) -->
                            <div class="col-md-5 d-flex align-items-center gap-2">
                                <select id="sizeSelect" class="form-select form-select-sm shadow-sm" style="width: 125px; cursor: pointer; height: 31px;">
                                    <option value="5">5개씩 보기</option>
                                    <option value="10" selected>10개씩 보기</option>
                                    <option value="25">25개씩 보기</option>
                                </select>

                                <div class="d-flex align-items-center bg-light border rounded px-2 shadow-sm text-secondary" style="height: 31px; font-size: 0.85rem;">
                                    <span class="fw-bold text-dark" id="totalCount">0 / 0</span>
                                    <span class="ms-1 text-muted">건</span>
                                </div>
                            </div>

                            <!-- 오른쪽: 액션 영역 (카테고리 필터 + 상태 필터 + 검색창 + 선택 삭제 버튼) -->
                            <div class="col-md-7 d-flex justify-content-end align-items-center gap-2">
                                <!-- 1. 카테고리 필터 -->
                                <select id="categorySelect" class="form-select form-select-sm shadow-sm" style="width: 130px; cursor: pointer; height: 31px;">
                                    <option value="">전체 카테고리</option>
                                    <option value="ELECTRONICS">전자기기</option>
                                    <option value="FASHION">패션</option>
                                    <option value="FOOD">식품</option>
                                    <option value="ELSE">기타</option>
                                </select>

                                <!-- 2. 상태 필터 -->
                                <select id="statusSelect" class="form-select form-select-sm shadow-sm" style="width: 110px; cursor: pointer; height: 31px;">
                                    <option value="">전체 상태</option>
                                    <option value="FOR_SALE">판매중</option>
                                    <option value="OUT_OF_STOCK">품절</option>
                                    <option value="DISCONTINUED">단종</option>
                                    <option value="DELETED">삭제됨</option>
                                </select>

                                <!-- 3. 검색창 그룹 -->
                                <div class="input-group input-group-sm shadow-sm" style="width: 240px; height: 31px;">
                                    <input type="text" id="keywordInput" class="form-control" placeholder="상품명 검색" style="height: 31px;">
                                    <button class="btn btn-primary d-flex align-items-center" id="searchBtn" type="button" style="height: 31px;">
                                        <i class="fas fa-search me-1"></i> 검색
                                    </button>
                                </div>

                                <!-- 4. 맨 오른쪽에 위치한 선택 삭제 버튼 -->
                                <button class="btn btn-danger btn-sm shadow-sm d-flex align-items-center gap-1" id="deleteCheckedBtn" type="button" style="height: 31px; font-size: 0.85rem;">
                                    <i class="fas fa-trash-alt"></i> 선택삭제
                                </button>
                            </div>

                        </div>
                        <table class="table table-bordered table-hover align-middle">
                            <thead>
                            <tr>
                                <!-- 1. 맨 앞: 전체 선택 체크박스 -->
                                <th class="text-center" style="width: 50px;">
                                    <input class="form-check-input" type="checkbox" id="selectAll">
                                </th>
                                <th class="text-center" style="width: 70px;">ID</th>
                                <th>상품명</th>
                                <th class="text-center" style="width: 110px;">카테고리</th>
                                <th class="text-end" style="width: 110px;">가격</th>
                                <th class="text-center" style="width: 80px;">재고</th>
                                <th class="text-center" style="width: 90px;">상태</th>
                                <th style="width: 180px;">등록 관리자</th>
                                <th class="text-center" style="width: 130px;">등록일</th>
                                <th class="text-center" style="width: 100px;">수정일</th>
                                <th class="text-center" style="width: 100px;">상세보기</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- JS가 이 곳에 데이터를 동적으로 채웁니다 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="common/fragments :: footer"></footer>
    </div>
</div>

<div th:replace="common/fragments :: common-scripts"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. DOM 요소 선택
        const tbody = document.querySelector('table tbody');
        const sizeSelect = document.getElementById('sizeSelect');
        const categorySelect = document.getElementById('categorySelect');
        const statusSelect = document.getElementById('statusSelect');
        const keywordInput = document.getElementById('keywordInput');
        const searchBtn = document.getElementById('searchBtn');
        const totalCountSpan = document.getElementById('totalCount');
        const deleteCheckedBtn = document.getElementById('deleteCheckedBtn');

        // 카테고리 한글 라벨 매핑 (뱃지/텍스트 표시용)
        const categoryLabels = {
            ELECTRONICS: '전자기기',
            FASHION: '패션',
            FOOD: '식품',
            ELSE: '기타'
        };

        // 상태 한글 라벨 매핑 (뱃지/텍스트 표시용)
        const statusLabels = {
            FOR_SALE: '판매중',
            OUT_OF_STOCK: '품절',
            DISCONTINUED: '단종',
            DELETED: '삭제됨'
        };

        const statusBadgeClasses = {
            FOR_SALE: 'bg-success',
            OUT_OF_STOCK: 'bg-warning',
            DISCONTINUED: 'bg-secondary',
            DELETED: 'bg-dark'
        };

        // 페이지네이션 영역 생성
        let paginationArea = document.querySelector('.pagination');
        if (!paginationArea) {
            paginationArea = document.createElement('ul');
            paginationArea.className = 'pagination justify-content-center mt-4';
            document.querySelector('.card-body').appendChild(paginationArea);
        }

        // 2. 메인 데이터 로드 함수
        window.loadProducts = function(page = 1) {
            const params = new URLSearchParams({
                page: page-1,
                size: sizeSelect.value
            });

            if (keywordInput.value.trim()) params.append('keyword', keywordInput.value.trim());
            if (categorySelect.value) params.append('category', categorySelect.value);
            if (statusSelect.value) params.append('status', statusSelect.value);

            // 정렬 조건이 화면에 추가될 경우를 대비한 방어 코드
            const sortSelect = document.getElementById('sortBy');
            const directionSelect = document.getElementById('direction');
            if (sortSelect?.value) params.append('sortBy', sortSelect.value);
            if (directionSelect?.value) params.append('direction', directionSelect.value);

            fetch(`/products?${params.toString()}`)
                .then(res => {
                    if (!res.ok) throw new Error('Network response was not ok');
                    return res.json();
                })
                .then(data => {
                    totalCountSpan.textContent = `${data.numberOfElements} / ${data.totalElements}`;
                    renderTable(data.content);
                    renderPagination(data.totalPages, data.number);
                })
                .catch(error => {
                    console.error('Error fetching products:', error);
                    alert('데이터를 불러오는데 실패했습니다.');
                });
        };

        // 3. 테이블 렌더링 함수
        function renderTable(products) {
            if (!products || products.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="text-center">데이터가 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = products.map(product => {
                const statusLabel = statusLabels[product.status] ?? product.status;
                const statusBadgeClass = statusBadgeClasses[product.status] ?? 'bg-secondary';
                const categoryLabel = categoryLabels[product.category] ?? product.category;
                const formattedPrice = Number(product.price).toLocaleString();
                const formattedCreateDate = (product.createdAt ?? '').toString().substring(0, 10);
                const formattedUpdateDate = (product.updatedAt ?? '').toString().substring(0, 10);

                return `
                <tr data-id="${product.id}">
                    <td class="text-center">
                        <input class="form-check-input row-checkbox" type="checkbox" value="${product.id}">
                    </td>
                    <td class="text-center">${product.id}</td>
                    <td>${product.name}</td>
                    <td class="text-center">${categoryLabel}</td>
                    <td class="text-end">${formattedPrice}원</td>
                    <td class="text-center">${product.stock}</td>
                    <td class="text-center"><span class="badge ${statusBadgeClass}">${statusLabel}</span></td>
                    <td>
                        <div>${product.adminName}</div>
                        <div class="text-muted" style="font-size: 0.8rem;">${product.adminEmail}</div>
                    </td>
                    <td class="text-center">${formattedCreateDate}</td>
                    <td class="text-center">${formattedUpdateDate}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary" onclick="viewProduct(${product.id})">
                            상세
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        // 4. 페이지네이션 렌더링 함수
        function renderPagination(totalPages, number) {
            if (totalPages <= 0) {
                paginationArea.innerHTML = '';
                return;
            }

            const currentPage = number + 1; // 스프링 API(0-based)를 프론트(1-based)로 변환
            let html = '';

            html += `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="if(${currentPage} > 1) window.loadProducts(${currentPage - 1});">이전</a>
            </li>
        `;

            for (let i = 1; i <= totalPages; i++) {
                html += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="window.loadProducts(${i});">${i}</a>
                </li>
            `;
            }

            html += `
            <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="if(${currentPage} < ${totalPages}) window.loadProducts(${currentPage + 1});">다음</a>
            </li>
        `;

            paginationArea.innerHTML = html;
        }

        // 5. 이벤트 리스너 등록
        searchBtn.addEventListener('click', () => loadProducts(1));
        keywordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadProducts(1);
        });
        categorySelect.addEventListener('change', () => loadProducts(1));
        statusSelect.addEventListener('change', () => loadProducts(1));
        sizeSelect.addEventListener('change', () => loadProducts(1));

        // 6. 초기 데이터 로딩
        loadProducts(1);

        // 상세 팝업 (추후 상세 페이지 or 모달로 교체)
        window.viewProduct = function(id) {
            window.location.href = `/view/products/${id}`;
        };

        // 체크박스 선택
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', function() {
                const rowCheckboxes = document.querySelectorAll('.row-checkbox');
                rowCheckboxes.forEach(cb => cb.checked = selectAllCheckbox.checked);
            });
        }

        if (deleteCheckedBtn) {
            deleteCheckedBtn.addEventListener('click', function() {
                const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');

                if (checkedBoxes.length === 0) {
                    alert('삭제할 상품을 선택해 주세요.');
                    return;
                }

                const idsToDelete = Array.from(checkedBoxes).map(cb => cb.value);

                if (confirm(`선택한 ${checkedBoxes.length}개의 상품을 정말 삭제하시겠습니까?\n(선택된 상품 ID: ${idsToDelete.join(', ')})`)) {

                    // TODO: 실제 삭제 API 연동 (예: DELETE /products, body: idsToDelete)
                    alert(`[깡통 작동 완료]\n백엔드로 ID [${idsToDelete.join(', ')}] 번의 삭제를 요청하는 척 화면을 갱신합니다.`);

                    const selectAllCheckbox = document.getElementById('selectAll');
                    if (selectAllCheckbox) selectAllCheckbox.checked = false;

                    loadProducts(1);
                }
            });
        }
    });
</script>
</body>
</html>
