<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head th:replace="~{common/fragments :: common-head}">
</head>

<body class="bg-primary">

<div id="layoutAuthentication">

    <div id="layoutAuthentication_content">

        <main>
            <div class="container">

                <div class="row justify-content-center">

                    <div class="col-lg-7">

                        <div class="card shadow-lg border-0 rounded-lg mt-5">

                            <div class="card-header">

                                <h3 class="text-center font-weight-light my-4">
                                    관리자 가입 신청
                                </h3>

                            </div>

                            <div class="card-body">

                                <form id="signupForm">

                                    <!-- 이름 -->
                                    <div class="form-floating mb-3">

                                        <input
                                                id="name"
                                                class="form-control"
                                                type="text"
                                                placeholder="이름"
                                                autocomplete="name"
                                                required
                                        >

                                        <label for="name">
                                            이름
                                        </label>

                                    </div>

                                    <!-- 이메일 -->
                                    <div class="form-floating mb-3">

                                        <input
                                                id="email"
                                                class="form-control"
                                                type="email"
                                                placeholder="name@example.com"
                                                autocomplete="email"
                                                required
                                        >

                                        <label for="email">
                                            이메일
                                        </label>

                                    </div>

                                    <!-- 비밀번호 -->
                                    <div class="form-floating mb-3">

                                        <input
                                                id="password"
                                                class="form-control"
                                                type="password"
                                                placeholder="비밀번호"
                                                autocomplete="new-password"
                                                minlength="8"
                                                required
                                        >

                                        <label for="password">
                                            비밀번호
                                        </label>

                                        <div class="form-text">
                                            비밀번호는 최소 8자 이상이어야 합니다.
                                        </div>

                                    </div>

                                    <!-- 전화번호 -->
                                    <div class="form-floating mb-3">

                                        <input
                                                id="phoneNumber"
                                                class="form-control"
                                                type="tel"
                                                placeholder="010-1234-5678"
                                                autocomplete="tel"
                                                maxlength="13"
                                                pattern="010-[0-9]{4}-[0-9]{4}"
                                                required
                                        >

                                        <label for="phoneNumber">
                                            전화번호
                                        </label>

                                        <div class="form-text">
                                            010-XXXX-XXXX 형식으로 입력해 주세요.
                                        </div>

                                    </div>

                                    <!-- 관리자 역할 -->
                                    <div class="form-floating mb-3">

                                        <select
                                                id="role"
                                                class="form-select"
                                                required
                                        >
                                            <option value="" selected disabled>
                                                관리자 역할을 선택해 주세요.
                                            </option>

                                            <option value="OPERATION_ADMIN">
                                                운영 관리자
                                            </option>

                                            <option value="CS_ADMIN">
                                                CS 관리자
                                            </option>
                                        </select>

                                        <label for="role">
                                            관리자 역할
                                        </label>

                                    </div>

                                    <!-- 오류 메시지 -->
                                    <div
                                            id="errorMessage"
                                            class="alert alert-danger d-none"
                                            role="alert"
                                    >
                                    </div>

                                    <!-- 성공 메시지 -->
                                    <div
                                            id="successMessage"
                                            class="alert alert-success d-none"
                                            role="alert"
                                    >
                                    </div>

                                    <!-- 가입 신청 버튼 -->
                                    <div class="d-grid mt-4">

                                        <button
                                                id="signupBtn"
                                                class="btn btn-primary"
                                                type="submit"
                                        >
                                            가입 신청
                                        </button>

                                    </div>

                                </form>

                            </div>

                            <div class="card-footer text-center py-3">

                                <div class="small">

                                    이미 관리자 계정이 있으신가요?

                                    <a th:href="@{/login}">
                                        로그인
                                    </a>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>
        </main>

    </div>

    <div id="layoutAuthentication_footer">

        <footer th:replace="~{common/fragments :: footer}">
        </footer>

    </div>

</div>

<div th:replace="~{common/fragments :: common-scripts}">
</div>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const signupForm =
            document.getElementById("signupForm");

        const nameInput =
            document.getElementById("name");

        const emailInput =
            document.getElementById("email");

        const passwordInput =
            document.getElementById("password");

        const phoneNumberInput =
            document.getElementById("phoneNumber");

        const roleSelect =
            document.getElementById("role");

        const signupButton =
            document.getElementById("signupBtn");

        const errorMessage =
            document.getElementById("errorMessage");

        const successMessage =
            document.getElementById("successMessage");


        /**
         * 관리자 회원가입
         *
         * POST /signup
         */
        signupForm.addEventListener(
            "submit",
            async function (event) {

                /*
                 * form의 기본 제출과 페이지 새로고침을 막는다.
                 */
                event.preventDefault();

                hideError();
                hideSuccess();

                /*
                 * required, email, minlength, pattern 등
                 * HTML 기본 유효성 검사를 실행한다.
                 */
                if (!signupForm.checkValidity()) {

                    signupForm.reportValidity();

                    return;
                }

                /*
                 * 중복 요청을 막기 위해 버튼을 비활성화한다.
                 */
                setSignupButtonLoading(true);

                /*
                 * AdminSignupRequest 필드명과 정확히 일치해야 한다.
                 */
                const requestBody = {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    password: passwordInput.value,
                    phoneNumber: phoneNumberInput.value.trim(),
                    role: roleSelect.value
                };

                try {

                    const response = await fetch(
                        "/signup",
                        {
                            method: "POST",

                            credentials: "same-origin",

                            headers: {
                                "Content-Type": "application/json",
                                "Accept": "application/json"
                            },

                            body: JSON.stringify(requestBody)
                        }
                    );


                    /*
                     * 400, 401, 403, 409, 500 등의 오류 응답 처리
                     */
                    if (!response.ok) {

                        const apiError =
                            await readApiError(response);

                        throw createApiError(apiError);
                    }


                    /*
                     * 현재 회원가입 Controller는
                     * AdminSignupResponse를 반환한다.
                     */
                    const signupResponse =
                        await readOptionalJson(response);


                    const signupName =
                        signupResponse?.name
                        || requestBody.name;


                    /*
                     * 회원가입 성공 후 폼 초기화
                     */
                    signupForm.reset();


                    showSuccess(
                        `${signupName}님의 관리자 가입 신청이 완료되었습니다. ` +
                        "슈퍼 관리자 승인 후 로그인할 수 있습니다."
                    );


                    /*
                     * 성공 메시지를 보여준 후 로그인 화면으로 이동
                     */
                    setTimeout(
                        function () {
                            window.location.href = "/login";
                        },
                        1500
                    );

                } catch (error) {

                    console.error(
                        "관리자 회원가입 요청 오류:",
                        error
                    );

                    showError(
                        getDisplayErrorMessage(error)
                    );

                } finally {

                    setSignupButtonLoading(false);
                }
            }
        );


        /**
         * 전화번호 자동 하이픈 처리
         *
         * 01012345678
         * → 010-1234-5678
         */
        phoneNumberInput.addEventListener(
            "input",
            function (event) {

                const numbers =
                    event.target.value
                        .replace(/[^0-9]/g, "")
                        .slice(0, 11);

                let formatted = numbers;

                if (numbers.length > 7) {

                    formatted =
                        numbers.slice(0, 3)
                        + "-"
                        + numbers.slice(3, 7)
                        + "-"
                        + numbers.slice(7);

                } else if (numbers.length > 3) {

                    formatted =
                        numbers.slice(0, 3)
                        + "-"
                        + numbers.slice(3);
                }

                event.target.value =
                    formatted;
            }
        );


        /**
         * 회원가입 버튼 로딩 상태
         */
        function setSignupButtonLoading(loading) {

            signupButton.disabled =
                loading;

            signupButton.textContent =
                loading
                    ? "가입 신청 중..."
                    : "가입 신청";
        }


        /**
         * 정상 응답 JSON을 선택적으로 읽는다.
         *
         * 응답 본문이 없어도 오류가 발생하지 않는다.
         */
        async function readOptionalJson(response) {

            const contentType =
                response.headers.get("content-type") || "";

            if (!contentType.includes("application/json")) {
                return null;
            }

            const text =
                await response.text();

            if (!text) {
                return null;
            }

            return JSON.parse(text);
        }


        /**
         * ApiResponse 실패 응답 읽기
         *
         * 예상 형식:
         *
         * {
         *     "status": 409,
         *     "errorCode": "ADM_002",
         *     "message": "이미 사용 중인 이메일입니다.",
         *     "data": null
         * }
         */
        async function readApiError(response) {

            const defaultError = {
                status: response.status,
                errorCode: "UNKNOWN_ERROR",
                message: `회원가입 요청에 실패했습니다. (${response.status})`
            };

            const contentType =
                response.headers.get("content-type") || "";


            /*
             * JSON이 아닌 문자열 오류 응답
             */
            if (!contentType.includes("application/json")) {

                const text =
                    await response.text();

                return {
                    ...defaultError,
                    message: text || defaultError.message
                };
            }


            const text =
                await response.text();

            if (!text) {
                return defaultError;
            }


            let responseBody;

            try {

                responseBody =
                    JSON.parse(text);

            } catch (error) {

                return {
                    ...defaultError,
                    message: text
                };
            }


            /*
             * CustomException 처리 응답
             *
             * ApiResponse.fail(
             *     status,
             *     errorCode,
             *     message
             * )
             */
            return {
                status:
                    responseBody.status
                    ?? responseBody.statusCode
                    ?? response.status,

                errorCode:
                    responseBody.errorCode
                    ?? responseBody.code
                    ?? "UNKNOWN_ERROR",

                message:
                    responseBody.message
                    ?? defaultError.message
            };
        }


        /**
         * ApiResponse 오류를 JavaScript Error로 변환한다.
         */
        function createApiError(apiError) {

            const error =
                new Error(apiError.message);

            error.status =
                apiError.status;

            error.errorCode =
                apiError.errorCode;

            return error;
        }


        /**
         * 화면에 표시할 오류 메시지를 만든다.
         *
         * 예:
         * 이미 사용 중인 이메일입니다. [ADM_002]
         */
        function getDisplayErrorMessage(error) {

            const message =
                error?.message
                || "회원가입 요청 처리 중 오류가 발생했습니다.";

            if (
                error?.errorCode
                && error.errorCode !== "UNKNOWN_ERROR"
            ) {
                return `${message} [${error.errorCode}]`;
            }

            return message;
        }


        /**
         * 오류 메시지 표시
         */
        function showError(message) {

            successMessage.textContent = "";
            successMessage.classList.add("d-none");

            errorMessage.textContent =
                message || "회원가입에 실패했습니다.";

            errorMessage.classList.remove("d-none");
        }


        /**
         * 오류 메시지 숨김
         */
        function hideError() {

            errorMessage.textContent = "";
            errorMessage.classList.add("d-none");
        }


        /**
         * 성공 메시지 표시
         */
        function showSuccess(message) {

            errorMessage.textContent = "";
            errorMessage.classList.add("d-none");

            successMessage.textContent =
                message;

            successMessage.classList.remove("d-none");
        }


        /**
         * 성공 메시지 숨김
         */
        function hideSuccess() {

            successMessage.textContent = "";
            successMessage.classList.add("d-none");
        }
    });
</script>

</body>
</html>
