<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{common/fragments :: common-head}"></head>
<body class="sb-nav-fixed bg-light">
<style>
    .selected-box {
        border: 1px solid #ced4da;
        border-radius: 0.375rem;
        padding: 15px;
        background-color: #f8f9fa;
    }
    .modal-body {
        max-height: 600px;
        overflow-y: auto;
    }
</style>
<!-- 공통 상단 네비게이션 -->
<div th:replace="~{common/fragments :: top-nav}"></div>

<div id="layoutSidenav">
    <!-- 공통 사이드 네비게이션 -->
    <div th:replace="~{common/fragments :: side-nav}"></div>

    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold mb-0"><i class="fas fa-cart-plus text-primary me-2"></i>CS 주문 생성</h2>
                </div>

                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4">
                        <form id="orderForm">
                            <!-- 1. 담당자 정보 -->
                            <div class="mb-4">
                                <h6 class="fw-bold text-secondary border-bottom pb-2 mb-3">1. 담당자 정보</h6>
                                <div class="row align-items-center">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small">이름</label>
                                        <input type="text" id="adminName" class="form-control bg-light" readonly placeholder="로딩중...">
                                    </div>
                                    <div class="col-md-6 mt-3 mt-md-0">
                                        <label class="form-label text-muted small">이메일</label>
                                        <input type="email" id="adminEmail" class="form-control bg-light" readonly placeholder="로딩중...">
                                    </div>
                                </div>
                            </div>

                            <!-- 2. 고객 선택 -->
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                                    <h6 class="fw-bold text-secondary mb-0">2. 고객 선택 <span class="text-danger">*</span></h6>
                                    <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#customerSearchModal">
                                        <i class="fas fa-search me-1"></i> 고객 검색
                                    </button>
                                </div>
                                <div class="selected-box" id="customerSelectedArea">
                                    <div class="text-muted text-center" id="noCustomerMsg">고객을 검색하여 선택해주세요.</div>
                                    <div id="customerInfo" class="d-none">
                                        <h5 class="fw-bold mb-1" id="selectedCustomerName">홍길동</h5>
                                        <p class="text-muted mb-0" id="selectedCustomerEmail">hong@example.com</p>
                                        <input type="hidden" id="selectedCustomerId" required>
                                    </div>
                                </div>
                            </div>

                            <!-- 3. 상품 선택 -->
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                                    <h6 class="fw-bold text-secondary mb-0">3. 상품 선택 <span class="text-danger">*</span></h6>
                                    <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#productSearchModal">
                                        <i class="fas fa-search me-1"></i> 상품 검색
                                    </button>
                                </div>
                                <div class="selected-box" id="productSelectedArea">
                                    <div class="text-muted text-center" id="noProductMsg">상품을 검색하여 선택해주세요.</div>
                                    <div id="productInfo" class="d-none">
                                        <h5 class="fw-bold mb-1" id="selectedProductName">상품명</h5>
                                        <p class="text-muted mb-0">
                                            단가: <span id="selectedProductPrice" class="fw-bold text-dark">0</span>원 | 
                                            현재 재고: <span id="selectedProductStock" class="fw-bold text-dark">0</span>개
                                        </p>
                                        <input type="hidden" id="selectedProductId" required>
                                    </div>
                                </div>
                            </div>

                            <!-- 4. 수량 및 총액 -->
                            <div class="mb-4">
                                <h6 class="fw-bold text-secondary border-bottom pb-2 mb-3">4. 주문 정보 <span class="text-danger">*</span></h6>
                                <div class="row align-items-end">
                                    <div class="col-md-4">
                                        <label class="form-label text-muted small">수량</label>
                                        <input type="number" id="orderQuantity" class="form-control" min="1" value="1" required>
                                    </div>
                                    <div class="col-md-8 text-end mt-3 mt-md-0">
                                        <span class="text-muted me-2">총 결제 금액:</span>
                                        <h3 class="fw-bold text-primary mb-0 d-inline-block"><span id="totalPrice">0</span> 원</h3>
                                    </div>
                                </div>
                            </div>

                            <!-- 5. 주문 생성 버튼 -->
                            <div class="text-end border-top pt-4 mt-4">
                                <button type="button" class="btn btn-secondary me-2" onclick="history.back()">취소</button>
                                <button type="submit" class="btn btn-primary px-4 fw-bold"><i class="fas fa-check me-1"></i> 주문 생성</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
        <!-- 공통 하단 푸터 -->
        <footer th:replace="~{common/fragments :: footer}"></footer>
    </div>
</div>

<!-- 고객 검색 모달 -->
<div class="modal fade" id="customerSearchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold"><i class="fas fa-search me-2"></i>고객 검색</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <input type="text" id="customerSearchKeyword" class="form-control" placeholder="이름 또는 이메일">
                    <button class="btn btn-primary" id="btnSearchCustomer"><i class="fas fa-search"></i></button>
                </div>
                <div class="list-group mb-3" id="customerListArea">
                    <div class="text-center py-3"><div class="spinner-border text-primary spinner-border-sm"></div></div>
                </div>
                <nav aria-label="Customer search pagination">
                    <ul class="pagination pagination-sm justify-content-center mb-0" id="customerPaginationArea">
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- 상품 검색 모달 -->
<div class="modal fade" id="productSearchModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold"><i class="fas fa-search me-2"></i>상품 검색</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="input-group mb-3">
                    <input type="text" id="productSearchKeyword" class="form-control" placeholder="상품명">
                    <button class="btn btn-primary" id="btnSearchProduct"><i class="fas fa-search"></i></button>
                </div>
                <div class="list-group mb-3" id="productListArea">
                    <div class="text-center py-3"><div class="spinner-border text-primary spinner-border-sm"></div></div>
                </div>
                <nav aria-label="Product search pagination">
                    <ul class="pagination pagination-sm justify-content-center mb-0" id="productPaginationArea">
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{common/fragments :: common-scripts}"></div>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- 유틸 함수 ---
        const escapeHtml = (text) => {
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        };

        const formatNumber = (num) => {
            return new Intl.NumberFormat('ko-KR').format(num || 0);
        };

        // --- 데이터 상태 ---
        let currentProductPrice = 0;

        // --- DOM 요소 ---
        const orderForm = document.getElementById('orderForm');
        const orderQuantity = document.getElementById('orderQuantity');
        const totalPriceEl = document.getElementById('totalPrice');

        // 1. 관리자 정보 로드
        fetch('/admins/me')
            .then(res => {
                if (!res.ok) throw new Error("관리자 정보를 불러올 수 없습니다.");
                return res.json();
            })
            .then(json => {
                const admin = json.data || json;
                document.getElementById('adminName').value = admin.name || '';
                document.getElementById('adminEmail').value = admin.email || '';
            })
            .catch(error => console.error(error));

        // 2. 총 결제 금액 업데이트
        const updateTotalPrice = () => {
            const qty = parseInt(orderQuantity.value) || 0;
            totalPriceEl.textContent = formatNumber(qty * currentProductPrice);
        };
        orderQuantity.addEventListener('input', updateTotalPrice);

        // 3. 고객 검색 모달 처리
        const btnSearchCustomer = document.getElementById('btnSearchCustomer');
        const customerSearchKeyword = document.getElementById('customerSearchKeyword');
        const customerListArea = document.getElementById('customerListArea');
        let currentCustomerPage = 1;
        const customerPaginationArea = document.getElementById('customerPaginationArea');
        // 부트스트랩 인스턴스는 한 번만 만들고 캐시
        let customerModalInstance = null;
        document.getElementById('customerSearchModal').addEventListener('show.bs.modal', function() {
            if (!customerListArea.querySelector('.list-group-item')) {
                searchCustomers(1);
            }
        });
        document.getElementById('customerSearchModal').addEventListener('shown.bs.modal', function() {
            customerSearchKeyword.focus();
        });

        window.searchCustomers = async (page = 1) => {
            currentCustomerPage = page;
            const keyword = customerSearchKeyword.value.trim();
            if (customerListArea.innerHTML.trim() === '' || customerListArea.innerHTML.includes('text-muted')) {
                customerListArea.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-primary spinner-border-sm"></div></div>';
            }
            // opacity 0.5로 낮추는 시각적 로딩 효과 제거 (새로고침처럼 보이는 원인)
            
            try {
                const res = await fetch(`/customers?keyword=${encodeURIComponent(keyword)}&status=ACTIVE&page=${page}&size=7`);
                const json = await res.json();
                const pageData = json.data || {};
                const customers = pageData.content || [];

                if (customers.length === 0) {
                    customerListArea.innerHTML = '<div class="text-center text-muted py-3">검색 결과가 없습니다.</div>';
                    customerPaginationArea.innerHTML = '';
                    return;
                }

                // 기존 요소를 재사용하여 텍스트만 교체 (화면 깜빡임 원천 차단)
                const items = customerListArea.querySelectorAll('.list-group-item');
                if (items.length !== 7) {
                    // 최초 1회만 7개의 빈 슬롯 생성
                    let initHtml = '';
                    for (let i = 0; i < 7; i++) {
                        initHtml += `
                            <button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                <div><span class="fw-bold name-el"></span><small class="text-muted ms-2 email-el"></small></div>
                                <span class="badge status-el"></span>
                            </button>
                        `;
                    }
                    customerListArea.innerHTML = initHtml;
                }

                const updatedItems = customerListArea.querySelectorAll('.list-group-item');
                for (let i = 0; i < 7; i++) {
                    const el = updatedItems[i];
                    if (i < customers.length) {
                        const c = customers[i];
                        const statusText = c.status === 'ACTIVE' ? '활성' : c.status === 'SUSPENDED' ? '정지' : '탈퇴';
                        const badgeClass = c.status === 'ACTIVE' ? 'bg-success' : c.status === 'SUSPENDED' ? 'bg-secondary' : 'bg-danger';
                        
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'auto';
                        el.setAttribute('onclick', `selectCustomer(${c.id}, '${escapeHtml(c.name)}', '${escapeHtml(c.email)}')`);
                        el.querySelector('.name-el').textContent = c.name;
                        el.querySelector('.email-el').textContent = c.email;
                        const badge = el.querySelector('.status-el');
                        badge.className = `badge status-el ${badgeClass}`;
                        badge.textContent = statusText;
                    } else {
                        el.style.opacity = '0';
                        el.style.pointerEvents = 'none';
                        el.removeAttribute('onclick');
                    }
                }

                const totalPages = pageData.totalPages || 1;
                let paginationHtml = '';
                
                paginationHtml += `
                    <li class="page-item ${page === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="javascript:void(0);" onclick="if(${page} > 1) searchCustomers(${page - 1})">이전</a>
                    </li>
                `;

                let startPage = Math.max(1, page - 2);
                let endPage = Math.min(totalPages, startPage + 4);
                if (endPage - startPage < 4) {
                    startPage = Math.max(1, endPage - 4);
                }

                for (let i = startPage; i <= endPage; i++) {
                    paginationHtml += `
                        <li class="page-item ${i === page ? 'active' : ''}">
                            <a class="page-link" href="javascript:void(0);" onclick="searchCustomers(${i})">${i}</a>
                        </li>
                    `;
                }

                paginationHtml += `
                    <li class="page-item ${page === totalPages ? 'disabled' : ''}">
                        <a class="page-link" href="javascript:void(0);" onclick="if(${page} < ${totalPages}) searchCustomers(${page + 1})">다음</a>
                    </li>
                `;

                customerPaginationArea.innerHTML = paginationHtml;

            } catch (error) {
                customerListArea.innerHTML = '<div class="text-center text-danger py-3">검색 중 오류가 발생했습니다.</div>';
            }
        };

        btnSearchCustomer.addEventListener('click', () => searchCustomers(1));
        customerSearchKeyword.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') searchCustomers(1);
        });

        window.selectCustomer = (id, name, email) => {
            document.getElementById('selectedCustomerId').value = id;
            document.getElementById('selectedCustomerName').textContent = name;
            document.getElementById('selectedCustomerEmail').textContent = email;
            document.getElementById('noCustomerMsg').classList.add('d-none');
            document.getElementById('customerInfo').classList.remove('d-none');
            
            if(!customerModalInstance) customerModalInstance = bootstrap.Modal.getInstance(document.getElementById('customerSearchModal'));
            if(customerModalInstance) customerModalInstance.hide();
        };

        // 4. 상품 검색 모달 처리
        const btnSearchProduct = document.getElementById('btnSearchProduct');
        const productSearchKeyword = document.getElementById('productSearchKeyword');
        const productListArea = document.getElementById('productListArea');
        let currentProductPage = 1;
        const productPaginationArea = document.getElementById('productPaginationArea');
        let productModalInstance = null;
        document.getElementById('productSearchModal').addEventListener('show.bs.modal', function() {
            if (!productListArea.querySelector('.list-group-item')) {
                searchProducts(1);
            }
        });
        document.getElementById('productSearchModal').addEventListener('shown.bs.modal', function() {
            productSearchKeyword.focus();
        });

        window.searchProducts = async (page = 1) => {
            currentProductPage = page;
            const keyword = productSearchKeyword.value.trim();
            if (productListArea.innerHTML.trim() === '' || productListArea.innerHTML.includes('text-muted')) {
                productListArea.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-primary spinner-border-sm"></div></div>';
            }
            // opacity 시각적 효과 제거
            
            try {
                const apiPage = page - 1; // Spring Data Pageable은 0부터 시작함
                const res = await fetch(`/products?keyword=${encodeURIComponent(keyword)}&status=FOR_SALE&page=${apiPage}&size=7`);
                const json = await res.json();
                const pageData = json.data || {};
                const products = pageData.content || [];

                if (products.length === 0) {
                    productListArea.innerHTML = '<div class="text-center text-muted py-3">판매 중인 검색 결과가 없습니다.</div>';
                    productPaginationArea.innerHTML = '';
                    return;
                }

                // 기존 요소를 재사용하여 텍스트만 교체
                const items = productListArea.querySelectorAll('.list-group-item');
                if (items.length !== 7) {
                    let initHtml = '';
                    for (let i = 0; i < 7; i++) {
                        initHtml += `
                            <button type="button" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                                <div><span class="fw-bold name-el"></span><small class="text-muted ms-2 price-el"></small></div>
                                <span class="badge bg-secondary stock-el"></span>
                            </button>
                        `;
                    }
                    productListArea.innerHTML = initHtml;
                }

                const updatedItems = productListArea.querySelectorAll('.list-group-item');
                for (let i = 0; i < 7; i++) {
                    const el = updatedItems[i];
                    if (i < products.length) {
                        const p = products[i];
                        el.style.opacity = '1';
                        el.style.pointerEvents = 'auto';
                        el.setAttribute('onclick', `selectProduct(${p.id}, '${escapeHtml(p.name)}', ${p.price}, ${p.stock})`);
                        el.querySelector('.name-el').textContent = p.name;
                        el.querySelector('.price-el').textContent = `${formatNumber(p.price)}원`;
                        el.querySelector('.stock-el').textContent = `재고: ${formatNumber(p.stock)}개`;
                    } else {
                        el.style.opacity = '0';
                        el.style.pointerEvents = 'none';
                        el.removeAttribute('onclick');
                    }
                }

                const totalPages = pageData.totalPages || 1;
                let paginationHtml = '';
                
                paginationHtml += `
                    <li class="page-item ${page === 1 ? 'disabled' : ''}">
                        <a class="page-link" href="javascript:void(0);" onclick="if(${page} > 1) searchProducts(${page - 1})">이전</a>
                    </li>
                `;

                let startPage = Math.max(1, page - 2);
                let endPage = Math.min(totalPages, startPage + 4);
                if (endPage - startPage < 4) {
                    startPage = Math.max(1, endPage - 4);
                }

                for (let i = startPage; i <= endPage; i++) {
                    paginationHtml += `
                        <li class="page-item ${i === page ? 'active' : ''}">
                            <a class="page-link" href="javascript:void(0);" onclick="searchProducts(${i})">${i}</a>
                        </li>
                    `;
                }

                paginationHtml += `
                    <li class="page-item ${page === totalPages ? 'disabled' : ''}">
                        <a class="page-link" href="javascript:void(0);" onclick="if(${page} < ${totalPages}) searchProducts(${page + 1})">다음</a>
                    </li>
                `;

                productPaginationArea.innerHTML = paginationHtml;

            } catch (error) {
                productListArea.innerHTML = '<div class="text-center text-danger py-3">검색 중 오류가 발생했습니다.</div>';
            }
        };

        btnSearchProduct.addEventListener('click', () => searchProducts(1));
        productSearchKeyword.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') searchProducts(1);
        });

        window.selectProduct = (id, name, price, stock) => {
            if (stock <= 0) {
                alert('재고가 없는 상품은 선택할 수 없습니다.');
                return;
            }
            document.getElementById('selectedProductId').value = id;
            document.getElementById('selectedProductName').textContent = name;
            document.getElementById('selectedProductPrice').textContent = formatNumber(price);
            document.getElementById('selectedProductStock').textContent = formatNumber(stock);
            document.getElementById('noProductMsg').classList.add('d-none');
            document.getElementById('productInfo').classList.remove('d-none');
            
            // 전역 변수 업데이트 및 총액 재계산
            currentProductPrice = price;
            orderQuantity.max = stock;
            if (parseInt(orderQuantity.value) > stock) {
                orderQuantity.value = stock;
            }
            updateTotalPrice();

            if(!productModalInstance) productModalInstance = bootstrap.Modal.getInstance(document.getElementById('productSearchModal'));
            if(productModalInstance) productModalInstance.hide();
        };

        // 5. 폼 제출 (주문 생성)
        orderForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const customerId = document.getElementById('selectedCustomerId').value;
            const productId = document.getElementById('selectedProductId').value;
            const qty = parseInt(orderQuantity.value) || 0;

            if (!customerId) {
                alert('고객을 선택해주세요.');
                return;
            }
            if (!productId) {
                alert('상품을 선택해주세요.');
                return;
            }
            if (qty <= 0) {
                alert('수량은 1개 이상이어야 합니다.');
                return;
            }

            const maxStock = parseInt(document.getElementById('selectedProductStock').textContent.replace(/,/g, '')) || 0;
            if (qty > maxStock) {
                alert(`주문 수량은 현재 재고(${maxStock}개)를 초과할 수 없습니다.`);
                return;
            }

            if (!confirm('위의 내용으로 주문을 생성하시겠습니까?')) return;

            try {
                const res = await fetch('/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerId: parseInt(customerId),
                        productId: parseInt(productId),
                        quantity: qty
                    })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.message || '주문 생성에 실패했습니다.');
                }

                alert('주문이 성공적으로 생성되었습니다.');
                window.location.href = '/view/orders'; // 주문 목록 페이지로 이동
            } catch (error) {
                alert(error.message);
            }
        });
    });
</script>
</body>
</html>
