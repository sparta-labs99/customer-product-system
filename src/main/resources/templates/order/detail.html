<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>

<div th:fragment="order-detail-modal" class="modal fade" id="orderDetailModal" tabindex="-1" aria-labelledby="orderDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header bg-light">
                <h5 class="modal-title fw-bold" id="orderDetailModalLabel">
                    <i class="fas fa-file-invoice text-primary me-2"></i>주문 상세 정보
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <div class="row">
                    <!-- 왼쪽: 주문/고객 정보 -->
                    <div class="col-md-7 border-end">
                        <h6 class="fw-bold text-secondary mb-3"><i class="fas fa-shopping-cart me-1"></i> 주문 및 상품 정보</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-borderless align-middle mb-4 text-nowrap">
                                <tbody>
                                <tr>
                                    <th style="width: 35%;" class="text-muted text-nowrap">주문번호</th>
                                    <td><span id="modalOrderNumber" class="fw-bold text-dark">로딩중...</span></td>
                                </tr>
                                <tr>
                                    <th class="text-muted text-nowrap">상품명</th>
                                    <td><span id="modalProductName">로딩중...</span></td>
                                </tr>
                                <tr>
                                    <th class="text-muted text-nowrap">수량</th>
                                    <td><span id="modalQuantity">로딩중...</span></td>
                                </tr>
                                <tr>
                                    <th class="text-muted text-nowrap">결제금액</th>
                                    <td><span id="modalTotalPrice" class="fw-bold text-primary">로딩중...</span></td>
                                </tr>
                                <tr>
                                    <th class="text-muted text-nowrap">주문일시</th>
                                    <td><span id="modalCreatedAt">로딩중...</span></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <h6 class="fw-bold text-secondary mb-3"><i class="fas fa-user me-1"></i> 고객 정보</h6>
                        <div class="table-responsive">
                            <table class="table table-sm table-borderless align-middle text-nowrap">
                                <tbody>
                                <tr>
                                    <th style="width: 35%;" class="text-muted text-nowrap">고객명</th>
                                    <td><span id="modalCustomerName">로딩중...</span></td>
                                </tr>
                                <tr>
                                    <th class="text-muted text-nowrap">이메일</th>
                                    <td><span id="modalCustomerEmail">로딩중...</span></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 오른쪽: 상태 및 관리자 정보 -->
                    <div class="col-md-5">
                        <h6 class="fw-bold text-secondary mb-3"><i class="fas fa-info-circle me-1"></i> 처리 상태</h6>
                        <div class="mb-4">
                            <div class="d-flex align-items-center flex-wrap gap-2 mb-2">
                                <span class="text-muted text-nowrap flex-shrink-0">현재상태</span>
                                
                                <!-- 취소된 주문 고정 뱃지 -->
                                <span id="modalStatusBadgeCanceled" class="badge bg-danger d-none px-3 py-2">
                                    <i class="fas fa-times-circle me-1"></i>주문취소
                                </span>

                                <!-- 관리자 권한별 상태 표시 (일반 관리자는 보기만, 슈퍼 관리자는 변경 가능) -->
                                <span id="modalStatusBadgeFixed" class="badge d-none px-3 py-2"></span>

                                <!-- 슈퍼 관리자용 상태 변경 드롭다운 -->
                                <div class="dropdown d-none" id="statusDropdownGroup">
                                    <button class="btn btn-sm fw-bold dropdown-toggle" type="button" id="statusDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false" style="text-align: left;">
                                        로딩중...
                                    </button>
                                    <ul class="dropdown-menu shadow-sm" aria-labelledby="statusDropdownBtn" style="min-width: 140px;">
                                        <li><a class="dropdown-item status-change-btn fw-bold" href="#" data-value="PENDING"><i class="fas fa-hourglass-half text-warning me-2"></i>준비중</a></li>
                                        <li><a class="dropdown-item status-change-btn fw-bold" href="#" data-value="SHIPPING"><i class="fas fa-truck text-info me-2"></i>배송중</a></li>
                                        <li><a class="dropdown-item status-change-btn fw-bold" href="#" data-value="COMPLETED"><i class="fas fa-check-circle text-success me-2"></i>배송완료</a></li>
                                    </ul>
                                </div>
                            </div>

                            <div id="cancelReasonArea" class="d-none bg-light p-2 rounded border border-danger">
                                <span class="text-danger fw-bold d-block mb-1" style="font-size: 0.85rem;"><i class="fas fa-exclamation-triangle me-1"></i>취소 사유</span>
                                <span id="modalCancelReason" class="text-dark" style="font-size: 0.9rem;"></span>
                            </div>
                        </div>

                        <h6 class="fw-bold text-secondary mb-3"><i class="fas fa-user-shield me-1"></i> 처리 담당자</h6>
                        <div class="card bg-light border-0 shadow-sm mt-2">
                            <div class="card-body py-3">
                                <div id="adminInfoArea" class="text-nowrap overflow-auto pb-1">
                                    <div class="mb-1"><span class="text-muted small me-2">이름:</span><span id="modalAdminName" class="fw-bold text-dark"></span></div>
                                    <div class="mb-1"><span class="text-muted small me-2">계정:</span><span id="modalAdminEmail"></span></div>
                                    <div><span class="text-muted small me-2">권한:</span><span id="modalAdminRole" class="badge bg-secondary"></span></div>
                                </div>
                                <div id="adminInfoEmpty" class="text-center text-muted py-2 d-none">
                                    <small>처리 담당자 정보가 없습니다.</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer bg-light justify-content-between">
                <div>
                    <!-- 주문 취소 버튼 (슈퍼 관리자용, 상태가 CANCELED가 아닐 때만 표시) -->
                    <button type="button" class="btn btn-outline-danger d-none" id="btnCancelOrderModal">
                        <i class="fas fa-ban me-1"></i>주문 취소
                    </button>
                </div>
                <div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
