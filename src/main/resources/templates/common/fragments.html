<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head th:fragment="common-head">
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>Mini Commerce Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous"/>
    <link th:href="@{/css/styles.css}" rel="stylesheet"/>
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous">
    </script>
</head>

<body>

<!-- 상단 내비게이션 -->
<nav th:fragment="top-nav" class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
    <a class="navbar-brand ps-3 fs-6" href="/">
        🛒 Mini Commerce Admin
    </a>

    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle" type="button">
        <i class="fas fa-bars"></i>
    </button>

    <!-- 상단 여백 보정 -->
    <div class="d-none d-md-inline-block ms-auto me-0 me-md-3 my-2 my-md-0"></div>

    <!-- 사용자 메뉴 -->
    <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-user fa-fw"></i>
            </a>

            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                <li>
                    <a class="dropdown-item" th:href="@{/profile}">
                        <i class="fas fa-user-circle me-2"></i>
                        Profile
                    </a>
                </li>



                <li>
                    <button type="button" class="dropdown-item" id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-2"></i>
                        Logout
                    </button>
                </li>
            </ul>
        </li>
    </ul>
</nav>


<!-- 사이드 내비게이션 -->
<div th:fragment="side-nav" id="layoutSidenav_nav">
    <nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion">
        <div class="sb-sidenav-menu">
            <div class="nav pt-4">

                <!-- 상품 메뉴 -->
                <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseProducts" aria-expanded="false" aria-controls="collapseProducts">
                    <div class="sb-nav-link-icon">
                        <i class="fas fa-box"></i>
                    </div>

                    상품

                    <div class="sb-sidenav-collapse-arrow">
                        <i class="fas fa-angle-down"></i>
                    </div>
                </a>

                <div class="collapse" id="collapseProducts" aria-labelledby="headingProducts" data-bs-parent="#sidenavAccordion">
                    <nav class="sb-sidenav-menu-nested nav">
                        <a class="nav-link" th:href="@{/view/products/list}">
                            상품 관리
                        </a>

                        <a class="nav-link" th:href="@{/view/reviews/list}">
                            상품 리뷰 관리
                        </a>
                    </nav>
                </div>


                <!-- 주문 메뉴 -->
                <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseOrders" aria-expanded="false" aria-controls="collapseOrders">
                    <div class="sb-nav-link-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>

                    주문

                    <div class="sb-sidenav-collapse-arrow">
                        <i class="fas fa-angle-down"></i>
                    </div>
                </a>

                <div class="collapse" id="collapseOrders" aria-labelledby="headingOrders" data-bs-parent="#sidenavAccordion">
                    <nav class="sb-sidenav-menu-nested nav">
                        <a class="nav-link" th:href="@{/view/orders/new}">
                            CS 주문 생성
                        </a>

                        <a class="nav-link" th:href="@{/view/orders}">
                            주문 관리
                        </a>
                    </nav>
                </div>


                <!-- 고객 메뉴 -->
                <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseCustomers" aria-expanded="false" aria-controls="collapseCustomers">
                    <div class="sb-nav-link-icon">
                        <i class="fas fa-users"></i>
                    </div>

                    고객

                    <div class="sb-sidenav-collapse-arrow">
                        <i class="fas fa-angle-down"></i>
                    </div>
                </a>

                <div class="collapse" id="collapseCustomers" aria-labelledby="headingCustomers" data-bs-parent="#sidenavAccordion">
                    <nav class="sb-sidenav-menu-nested nav">
                        <a class="nav-link" th:href="@{/view/customers}">
                            고객 관리
                        </a>
                    </nav>
                </div>


                <!-- 슈퍼 관리자 전용 메뉴 -->
                <div id="adminMenuWrapper" class="d-none">
                    <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseAdmins" aria-expanded="false" aria-controls="collapseAdmins">
                        <div class="sb-nav-link-icon">
                            <i class="fas fa-user-shield"></i>
                        </div>

                        관리자

                        <div class="sb-sidenav-collapse-arrow">
                            <i class="fas fa-angle-down"></i>
                        </div>
                    </a>

                    <div class="collapse" id="collapseAdmins" aria-labelledby="headingAdmins" data-bs-parent="#sidenavAccordion">
                        <nav class="sb-sidenav-menu-nested nav">
                            <a class="nav-link" th:href="@{/view/admins}">
                                관리자 관리
                            </a>
                        </nav>
                    </div>
                </div>

            </div>
        </div>
    </nav>
</div>


<!-- 하단 영역 -->
<footer th:fragment="footer" class="py-4 bg-light mt-auto">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between small">
            <div class="text-muted">
                (주) 사2좋아
            </div>
        </div>
    </div>
</footer>


<!-- 공통 스크립트 -->
<th:block th:fragment="common-scripts">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous">
    </script>

    <script th:src="@{/js/scripts.js}"></script>


    <!-- 슈퍼 관리자 메뉴 노출 -->
    <script>
        document.addEventListener("DOMContentLoaded", async function () {
            const adminMenuWrapper = document.getElementById("adminMenuWrapper");

            if (!adminMenuWrapper) {
                return;
            }

            try {
                const response = await fetch("/admins/me", {
                    method: "GET",
                    credentials: "same-origin",
                    headers: {
                        "Accept": "application/json"
                    }
                });

                if (!response.ok) {
                    return;
                }

                const responseBody = await response.json();
                const loginAdmin = responseBody.data;

                if (responseBody.success && loginAdmin?.role === "SUPER_ADMIN") {
                    adminMenuWrapper.classList.remove("d-none");
                }
            } catch (error) {
                console.error("관리자 메뉴 권한 확인 오류:", error);
            }
        });
    </script>


    <!-- 로그아웃 -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const logoutButton = document.getElementById("logoutBtn");

            if (!logoutButton) {
                return;
            }

            logoutButton.addEventListener("click", async function () {
                if (!confirm("로그아웃 하시겠습니까?")) {
                    return;
                }

                try {
                    const response = await fetch("/logout", {
                        method: "POST",
                        credentials: "same-origin",
                        headers: {
                            "Accept": "application/json"
                        }
                    });

                    const contentType = response.headers.get("content-type") || "";
                    let responseBody = null;

                    if (contentType.includes("application/json")) {
                        const text = await response.text();
                        if (text) {
                            responseBody = JSON.parse(text);
                        }
                    }

                    if (!response.ok) {
                        alert(responseBody?.message || `로그아웃에 실패했습니다. (${response.status})`);
                        return;
                    }

                    if (responseBody && responseBody.success === false) {
                        alert(responseBody.message || "로그아웃에 실패했습니다.");
                        return;
                    }

                    alert(responseBody?.message || "로그아웃되었습니다.");
                    window.location.href = "/login";
                } catch (error) {
                    console.error("로그아웃 요청 오류:", error);
                    alert("로그아웃 중 오류가 발생했습니다.");
                }
            });
        });
    </script>

</th:block>

</body>
</html>
