<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head th:fragment="common-head">
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Mini Commerce Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body>

<nav th:fragment="top-nav" class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
    <a class="navbar-brand ps-3" href="/">🛒 도파민 커머스</a>
    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>

    <form class="d-none d-md-inline-block form-inline ms-auto me-0 me-md-3 my-2 my-md-0">
        <div class="input-group">
            <input class="form-control"
                   type="text"
                   placeholder="Search for..."
                   aria-label="Search for..."
                   aria-describedby="btnNavbarSearch" />

            <button class="btn btn-primary"
                    id="btnNavbarSearch"
                    type="button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </form>

    <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
        <li class="nav-item dropdown">

            <a class="nav-link dropdown-toggle"
               id="navbarDropdown"
               href="#"
               role="button"
               data-bs-toggle="dropdown"
               aria-expanded="false">
                <i class="fas fa-user fa-fw"></i>
            </a>

            <ul class="dropdown-menu dropdown-menu-end"
                aria-labelledby="navbarDropdown">

                <li>
                    <a class="dropdown-item" th:href="@{/profile}">
                        <i class="fas fa-user-circle me-2"></i>
                        Profile
                    </a>
                </li>

                <li>
                    <a class="dropdown-item" href="#!">
                        Settings
                    </a>
                </li>

                <li>
                    <a class="dropdown-item" href="#!">
                        Activity Log
                    </a>
                </li>

                <li>
                    <hr class="dropdown-divider" />
                </li>

                <li>
                    <button type="button"
                            class="dropdown-item"
                            id="logoutBtn">
                        <i class="fas fa-sign-out-alt me-2"></i>
                        Logout
                    </button>
                </li>

            </ul>
        </li>
    </ul>
</nav>

<div th:fragment="side-nav" id="layoutSidenav_nav">

    <nav class="sb-sidenav accordion sb-sidenav-dark"
         id="sidenavAccordion">

        <div class="sb-sidenav-menu">
            <div class="nav">

                <div class="sb-sidenav-menu-heading">
                    Core
                </div>

                <a class="nav-link" href="/">
                    <div class="sb-nav-link-icon">
                        <i class="fas fa-tachometer-alt"></i>
                    </div>
                    Dashboard
                </a>

                <div class="sb-sidenav-menu-heading">
                    Interface
                </div>

                <a class="nav-link collapsed"
                   href="#"
                   data-bs-toggle="collapse"
                   data-bs-target="#collapseCustomers"
                   aria-expanded="false"
                   aria-controls="collapseCustomers">

                    <div class="sb-nav-link-icon">
                        <i class="fas fa-users"></i>
                    </div>

                    고객

                    <div class="sb-sidenav-collapse-arrow">
                        <i class="fas fa-angle-down"></i>
                    </div>
                </a>

                <div class="collapse"
                     id="collapseCustomers"
                     aria-labelledby="headingCustomers"
                     data-bs-parent="#sidenavAccordion">

                    <nav class="sb-sidenav-menu-nested nav">
                        <a class="nav-link"
                           th:href="@{/customers/list}">
                            고객 관리
                        </a>
                    </nav>
                </div>

                <a class="nav-link collapsed"
                   href="#"
                   data-bs-toggle="collapse"
                   data-bs-target="#collapseProducts"
                   aria-expanded="false"
                   aria-controls="collapseProducts">

                    <div class="sb-nav-link-icon">
                        <i class="fas fa-box"></i>
                    </div>

                    상품

                    <div class="sb-sidenav-collapse-arrow">
                        <i class="fas fa-angle-down"></i>
                    </div>
                </a>

                <div class="collapse"
                     id="collapseProducts"
                     aria-labelledby="headingProducts"
                     data-bs-parent="#sidenavAccordion">

                    <nav class="sb-sidenav-menu-nested nav">

                        <a class="nav-link"
                           th:href="@{/view/products/list}">
                            상품 관리
                        </a>

                        <a class="nav-link"
                           th:href="@{/view/reviews/list}">
                            상품 리뷰 관리
                        </a>

                    </nav>
                </div>

                <div id="adminMenuWrapper" class="d-none">

                    <a class="nav-link collapsed"
                       href="#"
                       data-bs-toggle="collapse"
                       data-bs-target="#collapseAdmins"
                       aria-expanded="false"
                       aria-controls="collapseAdmins">

                        <div class="sb-nav-link-icon">
                            <i class="fas fa-user-shield"></i>
                        </div>

                        관리자

                        <div class="sb-sidenav-collapse-arrow">
                            <i class="fas fa-angle-down"></i>
                        </div>
                    </a>

                    <div class="collapse"
                         id="collapseAdmins"
                         aria-labelledby="headingAdmins"
                         data-bs-parent="#sidenavAccordion">

                        <nav class="sb-sidenav-menu-nested nav">
                            <a class="nav-link"
                               th:href="@{/view/admins}">
                                관리자 관리
                            </a>
                        </nav>
                    </div>

                </div>

            </div>
        </div>

    </nav>
</div>

<footer th:fragment="footer"
        class="py-4 bg-light mt-auto">

    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between small">
            <div class="text-muted">
                (주) 사2좋아
            </div>
        </div>
    </div>
</footer>

<th:block th:fragment="common-scripts">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>

    <script th:src="@{/js/scripts.js}"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async function () {

            const adminMenuWrapper =
                document.getElementById("adminMenuWrapper");

            if (!adminMenuWrapper) {
                return;
            }

            try {

                const response = await fetch(
                    "/admins/me",
                    {
                        method: "GET",
                        credentials: "same-origin",
                        headers: {
                            "Accept": "application/json"
                        }
                    }
                );

                if (!response.ok) {
                    return;
                }

                const responseBody =
                    await response.json();

                const loginAdmin =
                    responseBody.data;

                if (
                    responseBody.success
                    && loginAdmin?.role === "SUPER_ADMIN"
                ) {
                    adminMenuWrapper.classList.remove("d-none");
                }

            } catch (error) {

                console.error(
                    "관리자 메뉴 권한 확인 오류:",
                    error
                );
            }
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const logoutButton =
                document.getElementById("logoutBtn");

            if (!logoutButton) {
                return;
            }

            logoutButton.addEventListener(
                "click",
                async function () {

                    if (!confirm("로그아웃 하시겠습니까?")) {
                        return;
                    }

                    try {

                        const response = await fetch(
                            "/logout",
                            {
                                method: "POST",
                                credentials: "same-origin",
                                headers: {
                                    "Accept": "application/json"
                                }
                            }
                        );

                        const contentType =
                            response.headers.get("content-type") || "";

                        let responseBody = null;

                        if (contentType.includes("application/json")) {

                            const text =
                                await response.text();

                            if (text) {
                                responseBody =
                                    JSON.parse(text);
                            }
                        }

                        if (!response.ok) {

                            alert(
                                responseBody?.message
                                || `로그아웃에 실패했습니다. (${response.status})`
                            );

                            return;
                        }

                        if (
                            responseBody
                            && responseBody.success === false
                        ) {

                            alert(
                                responseBody.message
                                || "로그아웃에 실패했습니다."
                            );

                            return;
                        }

                        alert(
                            responseBody?.message
                            || "로그아웃되었습니다."
                        );

                        window.location.href =
                            "/login";

                    } catch (error) {

                        console.error(
                            "로그아웃 요청 오류:",
                            error
                        );

                        alert(
                            "로그아웃 중 오류가 발생했습니다."
                        );
                    }
                }
            );
        });
    </script>

</th:block>

</body>
</html>
