<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="common/fragments :: common-head">
</head>
<body class="sb-nav-fixed">

<nav th:replace="common/fragments :: top-nav"></nav>

<div id="layoutSidenav">
    <div th:replace="common/fragments :: side-nav"></div>

    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <h1 class="mt-4 mb-4">고객 관리</h1>
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row mb-3 align-items-center">
                            <!-- 왼쪽: 갯수 선택 & 카운터 -->
                            <div class="col-md-5 d-flex align-items-center gap-2">
                                <select id="sizeSelect" class="form-select form-select-sm shadow-sm" style="width: 125px; cursor: pointer; height: 31px;">
                                    <option value="5">5개씩 보기</option>
                                    <option value="10" selected>10개씩 보기</option>
                                    <option value="25">25개씩 보기</option>
                                </select>
                                <div class="d-flex align-items-center bg-light border rounded px-2 shadow-sm text-secondary" style="height: 31px; font-size: 0.85rem;">
                                    <span class="fw-bold text-dark" id="totalCount">0 / 0</span>
                                    <span class="ms-1 text-muted">명</span>
                                </div>
                            </div>

                            <!-- 오른쪽: 검색조건 필터 및 삭제 버튼 -->
                            <div class="col-md-7 d-flex justify-content-end align-items-center gap-2">
                                <select id="statusSelect" class="form-select form-select-sm shadow-sm" style="width: 110px; cursor: pointer; height: 31px;">
                                    <option value="">전체 상태</option>
                                    <option value="ACTIVE">활성</option>
                                    <option value="INACTIVE">탈퇴</option>
                                    <option value="SUSPENDED">정지</option>
                                </select>

                                <div class="input-group input-group-sm shadow-sm" style="width: 260px; height: 31px;">
                                    <input type="text" id="keywordInput" class="form-control" placeholder="이름 또는 이메일 검색">
                                    <button class="btn btn-primary d-flex align-items-center" id="searchBtn" type="button">
                                        <i class="fas fa-search me-1"></i> 검색
                                    </button>
                                </div>

                                <button class="btn btn-danger btn-sm shadow-sm d-flex align-items-center gap-1" id="deleteCheckedBtn" type="button" style="height: 31px; font-size: 0.85rem;">
                                    <i class="fas fa-trash-alt"></i> 선택탈퇴
                                </button>
                            </div>

                        </div>
                        <table class="table table-bordered table-hover align-middle">
                            <thead>
                            <tr>
                                <th class="text-center" style="width: 50px;">
                                    <input class="form-check-input" type="checkbox" id="selectAll">
                                </th>
                                <th class="sortable" data-sort="name" style="cursor: pointer;">이름 <span class="sort-icon text-secondary" style="font-size: 0.8em;"></span></th>
                                <th class="sortable" data-sort="email" style="cursor: pointer;">이메일 <span class="sort-icon text-secondary" style="font-size: 0.8em;"></span></th>
                                <th class="sortable" data-sort="createdAt" style="cursor: pointer;">가입일 <span class="sort-icon text-primary" style="font-size: 0.8em;">▼</span></th>
                                <th>상태</th>
                                <th class="text-center" style="width: 100px;">관리</th>
                            </tr>
                            </thead>
                            <tbody id="customerTableBody">
                            </tbody>
                        </table>

                        <!-- 페이지네이션 컨테이너 -->
                        <ul class="pagination justify-content-center mt-4" id="paginationArea"></ul>
                    </div>
                </div>
            </div>
        </main>
        <div th:replace="~{customer/detail :: customer-detail-modal}"></div>
        <footer th:replace="common/fragments :: footer"></footer>
    </div>
</div>

<div th:replace="common/fragments :: common-scripts"></div>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {

        const isSuperAdmin = [[${session.LOGIN_ADMIN != null and session.LOGIN_ADMIN.role.name() == 'SUPER_ADMIN'}]];

        /**
         * 1. DOM 요소 및 전역 상태 관리
         */
        const elements = {
            tbody: document.getElementById('customerTableBody'),
            sizeSelect: document.getElementById('sizeSelect'),
            statusSelect: document.getElementById('statusSelect'),
            keywordInput: document.getElementById('keywordInput'),
            searchBtn: document.getElementById('searchBtn'),
            totalCountSpan: document.getElementById('totalCount'),
            deleteCheckedBtn: document.getElementById('deleteCheckedBtn'),
            selectAll: document.getElementById('selectAll'),
            paginationArea: document.getElementById('paginationArea'),
            sortableHeaders: document.querySelectorAll('th.sortable')
        };

        let state = {
            currentSortBy: 'createdAt',
            currentDirection: 'desc',
            currentPage: 1
        };

        /**
         * util: XSS 방지용 HTML 이스케이프
         */
        const escapeHtml = (unsafe) => {
            if (unsafe == null) return '';
            return unsafe.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        };

        /**
         * util: 날짜 포맷 변환
         */
        const formatDate = (isoString) => {
            if (!isoString) return '-';
            const date = new Date(isoString);
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}`;
        };

        /**
         * util: 숫자 콤마 포맷팅
         */
        const formatNumber = (number) => {
            return new Intl.NumberFormat('ko-KR').format(number);
        };

        /**
         * 고객 목록 API 조회
         */
        const loadCustomers = (page = 1) => {
            state.currentPage = page; // 현재 페이지 상태 저장

            const params = new URLSearchParams({
                page: page,
                size: elements.sizeSelect.value,
                sortBy: state.currentSortBy,
                direction: state.currentDirection
            });

            if (elements.keywordInput.value.trim()) params.append('keyword', elements.keywordInput.value.trim());
            if (elements.statusSelect.value) params.append('status', elements.statusSelect.value);

            fetch(`/customers?${params.toString()}`)
                .then(async res => {
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.message || '데이터 조회 실패');
                    }
                    return res.json();
                }).then(json => {
                const data = json.data;
                elements.totalCountSpan.textContent = `${data.numberOfElements} / ${data.totalElements}`;
                renderTable(data.content);
                renderPagination(data.totalPages, data.number);
                syncSelectAll();
            }).catch(error => {
                console.error('Fetch Error:', error);
                alert(error.message);
            });
        };

        /**
         * 테이블 렌더링
         */
        const renderTable = (customers) => {
            if (!customers || customers.length === 0) {
                elements.tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">데이터가 없습니다.</td></tr>`;
                return;
            }

            elements.tbody.innerHTML = customers.map(customer => {
                const badgeClass = customer.status === 'ACTIVE' ? 'bg-success' :
                    customer.status === 'INACTIVE' ? 'bg-danger' : 'bg-secondary';

                const statusName = customer.status === 'ACTIVE' ? '활성' :
                                   customer.status === 'INACTIVE' ? '탈퇴' :
                                   customer.status === 'SUSPENDED' ? '정지' : customer.status;

                return `
                <tr>
                    <td class="text-center">
                        <input class="form-check-input row-checkbox" type="checkbox" value="${customer.id}">
                    </td>
                    <td>${escapeHtml(customer.name)}</td>
                    <td>${escapeHtml(customer.email)}</td>
                    <td>${formatDate(customer.createdAt)}</td>
                    <td><span class="badge ${badgeClass}">${statusName}</span></td>
                    <td class="text-center">
                        <button type="button" class="btn btn-sm btn-outline-primary btn-detail" data-id="${customer.id}">
                            상세
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        };

        /**
         * 페이지네이션 렌더링
         */
        const renderPagination = (totalPages, number) => {
            if (totalPages <= 0) {
                elements.paginationArea.innerHTML = '';
                return;
            }

            const currentPage = number + 1;
            const blockSize = 5;
            const startPage = Math.floor((currentPage - 1) / blockSize) * blockSize + 1;
            let endPage = startPage + blockSize - 1;
            if (endPage > totalPages) endPage = totalPages;

            let html = '';

            html += `
            <li class="page-item ${startPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0);" data-page="${startPage - 1}">이전</a>
            </li>`;

            for (let i = startPage; i <= endPage; i++) {
                html += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0);" data-page="${i}">${i}</a>
                </li>`;
            }

            html += `
            <li class="page-item ${endPage >= totalPages ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0);" data-page="${endPage + 1}">다음</a>
            </li>`;

            elements.paginationArea.innerHTML = html;
        };

        /**
         * 전체선택 체크박스 상태 동기화
         */
        const syncSelectAll = () => {
            const checkboxes = document.querySelectorAll('.row-checkbox');
            const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');

            if (checkboxes.length === 0) {
                elements.selectAll.checked = false;
            } else {
                elements.selectAll.checked = (checkboxes.length === checkedBoxes.length);
            }
        };

        /**
         * 이벤트 리스너 세팅
         */
        elements.searchBtn.addEventListener('click', () => loadCustomers(1));
        elements.keywordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') loadCustomers(1); });
        elements.statusSelect.addEventListener('change', () => loadCustomers(1));
        elements.sizeSelect.addEventListener('change', () => loadCustomers(1));

        elements.sortableHeaders.forEach(th => {
            th.addEventListener('click', function() {
                const clickedSort = this.getAttribute('data-sort');

                if (state.currentSortBy === clickedSort) {
                    state.currentDirection = state.currentDirection === 'desc' ? 'asc' : 'desc';
                } else {
                    state.currentSortBy = clickedSort;
                    state.currentDirection = 'desc';
                }

                elements.sortableHeaders.forEach(header => {
                    const iconSpan = header.querySelector('.sort-icon');
                    iconSpan.textContent = '';
                    iconSpan.className = 'sort-icon text-secondary';
                });

                const currentIconSpan = this.querySelector('.sort-icon');
                currentIconSpan.textContent = state.currentDirection === 'desc' ? '▼' : '▲';
                currentIconSpan.className = 'sort-icon text-primary';

                loadCustomers(1);
            });
        });

        elements.paginationArea.addEventListener('click', function(e) {
            const target = e.target;
            if (target.classList.contains('page-link')) {
                const parentLi = target.closest('.page-item');
                if (!parentLi.classList.contains('disabled') && !parentLi.classList.contains('active')) {
                    const page = parseInt(target.getAttribute('data-page'), 10);
                    loadCustomers(page);
                }
            }
        });

        // ================= 모달 및 상세 로직 ================= //

        let currentModalCustomerId = null;

        const toggleModalMode = (isEdit) => {
            document.querySelectorAll('.view-mode').forEach(el => el.classList.toggle('d-none', isEdit));
            document.querySelectorAll('.edit-mode').forEach(el => el.classList.toggle('d-none', !isEdit));
        };

        // 🔍 [상세] 버튼 클릭 이벤트
        elements.tbody.addEventListener('click', function(e) {
            const detailBtn = e.target.closest('.btn-detail');
            if (detailBtn) {
                e.preventDefault();
                const id = detailBtn.getAttribute('data-id');
                currentModalCustomerId = id;

                fetch(`/customers/${id}`)
                    .then(async res => {
                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}));
                            throw new Error(err.message || '고객 정보를 불러올 수 없습니다.');
                        }
                        return res.json();
                    }).then(json => {
                    const data = json.data;
                    // 1. 읽기 모드 바인딩
                    document.getElementById('modalCustomerName').textContent = data.name;
                    document.getElementById('modalCustomerEmail').textContent = data.email;
                    document.getElementById('modalCustomerPhone').textContent = data.phoneNumber || '미등록';
                    document.getElementById('modalCustomerCreatedAt').textContent = formatDate(data.createdAt);
                    document.getElementById('modalOrderCount').textContent = formatNumber(data.totalOrderCount);
                    document.getElementById('modalPurchaseAmount').textContent = formatNumber(data.totalPurchaseAmount);

                    // ⭐ 권한에 따른 상태 UI 처리
                    const inactiveBadge = document.getElementById('modalStatusBadgeInactive');
                    const dropdownGroup = document.getElementById('statusDropdownGroup');
                    const dropdownBtn = document.getElementById('statusDropdownBtn');
                    const fixedBadge = document.getElementById('modalStatusBadgeFixed');

                    // 일단 모두 숨김 처리로 리셋
                    if(inactiveBadge) inactiveBadge.classList.add('d-none');
                    if(dropdownGroup) dropdownGroup.classList.add('d-none');
                    if(fixedBadge) fixedBadge.classList.add('d-none');

                    if (data.status === 'INACTIVE') {
                        // 1. 탈퇴 회원이면 권한 무관 빨간 뱃지 표시
                        if(inactiveBadge) inactiveBadge.classList.remove('d-none');
                    } else {
                        // 2. 활성/정지 회원일 때 권한 분기
                        if (isSuperAdmin) {
                            // [슈퍼 관리자] 상태 변경 드롭다운 표시
                            if(dropdownGroup) dropdownGroup.classList.remove('d-none');

                            if (data.status === 'ACTIVE') {
                                dropdownBtn.className = 'btn btn-sm btn-success dropdown-toggle fw-bold';
                                dropdownBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> 활성';
                                dropdownBtn.setAttribute('data-status', 'ACTIVE');
                            } else if (data.status === 'SUSPENDED') {
                                dropdownBtn.className = 'btn btn-sm btn-secondary dropdown-toggle fw-bold';
                                dropdownBtn.innerHTML = '<i class="fas fa-ban me-1"></i> 정지';
                                dropdownBtn.setAttribute('data-status', 'SUSPENDED');
                            }
                        } else {
                            // [일반 관리자] 수정 불가능한 고정 뱃지 표시
                            if(fixedBadge) {
                                fixedBadge.classList.remove('d-none');
                                if (data.status === 'ACTIVE') {
                                    fixedBadge.className = 'badge bg-success px-3 py-2';
                                    fixedBadge.innerHTML = '<i class="fas fa-check-circle me-1"></i> 활성';
                                } else if (data.status === 'SUSPENDED') {
                                    fixedBadge.className = 'badge bg-secondary px-3 py-2';
                                    fixedBadge.innerHTML = '<i class="fas fa-ban me-1"></i> 정지';
                                }
                            }
                        }
                    }

                    // 2. 수정 모드(input) 초기값 바인딩
                    document.getElementById('editCustomerName').value = data.name;
                    document.getElementById('editCustomerEmail').value = data.email;
                    document.getElementById('editCustomerPhone').value = data.phoneNumber || '';

                    toggleModalMode(false);

                    // 3. 모달 띄우기
                    const modalElement = document.getElementById('customerDetailModal');
                    bootstrap.Modal.getOrCreateInstance(modalElement).show();
                }).catch(error => { alert(error.message); });
            }
        });

        // 🛠️ [수정하기] 버튼 클릭
        document.getElementById('btnEditMode').addEventListener('click', () => {
            const inactiveBadge = document.getElementById('modalStatusBadgeInactive');
            const isInactive = inactiveBadge && !inactiveBadge.classList.contains('d-none');

            if (isInactive) {
                alert('탈퇴(삭제)된 회원은 정보를 수정할 수 없습니다.');
                return;
            }
            toggleModalMode(true);
        });

        // 🛠️ [취소]
        document.getElementById('btnCancelEdit').addEventListener('click', () => {
            toggleModalMode(false);
        });

        // 🛠️ [기본 정보 저장] 버튼 클릭 (PUT 단독 처리)
        document.getElementById('btnSaveEdit').addEventListener('click', () => {
            if (!confirm('수정된 기본 정보를 저장하시겠습니까?')) return;

            const name = document.getElementById('editCustomerName').value;
            const email = document.getElementById('editCustomerEmail').value;
            const phoneNumber = document.getElementById('editCustomerPhone').value;

            fetch(`/customers/${currentModalCustomerId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, phoneNumber })
            })
                .then(async res => {
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.message || "수정 중 오류가 발생했습니다.");
                    }
                    alert('기본 정보가 수정되었습니다.');

                    loadCustomers(state.currentPage);

                    document.getElementById('modalCustomerName').textContent = name;
                    document.getElementById('modalCustomerEmail').textContent = email;
                    document.getElementById('modalCustomerPhone').textContent = phoneNumber || '미등록';

                    toggleModalMode(false);
                })
                .catch(error => { alert(error.message); });
        });

        // ️ [상태 변경] 드롭다운 클릭 이벤트 (PATCH 단독 처리 - 슈퍼 관리자만 동작)
        document.querySelectorAll('.status-change-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();

                const newStatus = this.getAttribute('data-value');
                const dropdownBtn = document.getElementById('statusDropdownBtn');
                const currentStatus = dropdownBtn.getAttribute('data-status');

                if (newStatus === currentStatus) return;

                const statusText = newStatus === 'ACTIVE' ? '활성' : '정지';

                if (!confirm(`고객 상태를 '${statusText}'(으)로 변경하시겠습니까?`)) return;

                fetch(`/customers/${currentModalCustomerId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                }).then(async res => {
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.message || "상태 변경에 실패했습니다. 권한을 확인해주세요.");
                    }
                    alert('고객 상태가 변경되었습니다.');

                    if (newStatus === 'ACTIVE') {
                        dropdownBtn.className = 'btn btn-sm btn-success dropdown-toggle fw-bold';
                        dropdownBtn.innerHTML = '<i class="fas fa-check-circle me-1"></i> 활성';
                        dropdownBtn.setAttribute('data-status', 'ACTIVE');
                    } else {
                        dropdownBtn.className = 'btn btn-sm btn-secondary dropdown-toggle fw-bold';
                        dropdownBtn.innerHTML = '<i class="fas fa-ban me-1"></i> 정지';
                        dropdownBtn.setAttribute('data-status', 'SUSPENDED');
                    }
                    loadCustomers(state.currentPage);
                }).catch(error => {

                    alert(error.message);
                });
            });
        });

        // ️ [모달 닫힘] 초기화 로직
        const modalElement = document.getElementById('customerDetailModal');
        if (modalElement) {
            modalElement.addEventListener('hidden.bs.modal', function () {
                document.activeElement.blur(); // 포커스 꼬임 방지
                toggleModalMode(false);
                currentModalCustomerId = null;

                document.getElementById('modalCustomerName').textContent = '로딩중...';
                document.getElementById('modalCustomerEmail').textContent = '로딩중...';
                document.getElementById('modalCustomerPhone').textContent = '로딩중...';

                // 상태 관련 뱃지/버튼들 텍스트 초기화
                const fixedBadge = document.getElementById('modalStatusBadgeFixed');
                const dropdownBtn = document.getElementById('statusDropdownBtn');
                if(fixedBadge) fixedBadge.innerHTML = '';
                if(dropdownBtn) dropdownBtn.innerHTML = '로딩중...';

                document.getElementById('modalOrderCount').textContent = '0';
                document.getElementById('modalPurchaseAmount').textContent = '0';
            });
        }

        elements.tbody.addEventListener('change', function(e) {
            if (e.target.classList.contains('row-checkbox')) syncSelectAll();
        });

        if (elements.selectAll) {
            elements.selectAll.addEventListener('change', function() {
                const rowCheckboxes = document.querySelectorAll('.row-checkbox');
                rowCheckboxes.forEach(cb => cb.checked = elements.selectAll.checked);
            });
        }

        //  [다중 삭제 이벤트]
        if (elements.deleteCheckedBtn) {
            elements.deleteCheckedBtn.addEventListener('click', function() {
                if (!isSuperAdmin) {
                    alert('슈퍼 관리자 권한이 필요합니다.');
                    return;
                }

                const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');

                if (checkedBoxes.length === 0) {
                    alert('삭제할 고객을 선택해 주세요.');
                    return;
                }

                const idsToDelete = Array.from(checkedBoxes).map(cb => parseInt(cb.value, 10));

                if (confirm(`선택한 ${checkedBoxes.length}명의 고객을 정말 탈퇴 처리하시겠습니까?`)) {
                    fetch('/customers/withdraw', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(idsToDelete)
                    }).then(async res => {
                        if (!res.ok) {
                            const err = await res.json().catch(() => ({}));
                            throw new Error(err.message || '삭제 권한이 없거나 실패했습니다.');
                        }
                        alert('선택한 고객이 삭제되었습니다.');
                        elements.selectAll.checked = false;
                        loadCustomers(state.currentPage);
                    }).catch(error => {
                        console.error('Delete Error:', error);
                        alert(error.message);
                    });
                }
            });
        }

        // 3. 초기 데이터 로딩
        loadCustomers(1);
    });
</script>
</body>
</html>
