<div th:fragment="password-change-modal" class="modal fade" id="passwordChangeModal" tabindex="-1" aria-labelledby="passwordChangeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="passwordChangeModalLabel"><i class="fas fa-key me-1"></i> 비밀번호 변경</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="passwordChangeForm">
                    <div class="mb-3">
                        <label for="currentPassword" class="form-label fw-bold text-secondary">현재 비밀번호</label>
                        <input type="password" class="form-control" id="currentPassword" required>
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label fw-bold text-secondary">새 비밀번호</label>
                        <input type="password" class="form-control" id="newPassword" required minlength="8">
                        <div class="form-text">새 비밀번호는 최소 8자 이상이어야 합니다.</div>
                    </div>
                    <div class="mb-4">
                        <label for="newPasswordConfirm" class="form-label fw-bold text-secondary">새 비밀번호 확인</label>
                        <input type="password" class="form-control" id="newPasswordConfirm" required minlength="8">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button type="submit" form="passwordChangeForm" class="btn btn-primary" id="changePasswordBtn">비밀번호 변경</button>
            </div>
        </div>
    </div>
</div>
