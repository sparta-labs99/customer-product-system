<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="common/fragments :: common-head">
</head>
<body class="sb-nav-fixed">

<nav th:replace="common/fragments :: top-nav"></nav>

<div id="layoutSidenav">
    <div th:replace="common/fragments :: side-nav"></div>

    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <h1 class="mt-4 mb-4">대시보드</h1>

                <!-- ================= Summary 통계 ================= -->
                <div class="row" id="summarySection">
                    <div class="col-xl-2-4 col-md-4 mb-4">
                        <div class="card border-start-primary shadow-sm h-100">
                            <div class="card-body">
                                <div class="text-muted small mb-1">전체 관리자 수</div>
                                <div class="fs-3 fw-bold" id="totalAdmin">-</div>
                                <div class="text-success small">활성 <span id="activeAdmin">-</span>명</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-2-4 col-md-4 mb-4">
                        <div class="card border-start-info shadow-sm h-100">
                            <div class="card-body">
                                <div class="text-muted small mb-1">전체 고객 수</div>
                                <div class="fs-3 fw-bold" id="totalCustomer">-</div>
                                <div class="text-success small">활성 <span id="activeCustomer">-</span>명</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-2-4 col-md-4 mb-4">
                        <div class="card border-start-warning shadow-sm h-100">
                            <div class="card-body">
                                <div class="text-muted small mb-1">전체 상품 수</div>
                                <div class="fs-3 fw-bold" id="totalProduct">-</div>
                                <div class="text-danger small">재고 부족 <span id="summaryLimitStockProduct">-</span>개</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-2-4 col-md-4 mb-4">
                        <div class="card border-start-success shadow-sm h-100">
                            <div class="card-body">
                                <div class="text-muted small mb-1">전체 주문 수</div>
                                <div class="fs-3 fw-bold" id="totalOrder">-</div>
                                <div class="text-muted small">오늘 <span id="todayOrder">-</span>건</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-2-4 col-md-4 mb-4">
                        <div class="card border-start-secondary shadow-sm h-100">
                            <div class="card-body">
                                <div class="text-muted small mb-1">전체 리뷰 수</div>
                                <div class="fs-3 fw-bold" id="totalReview">-</div>
                                <div class="text-muted small">
                                    평균 <span id="averageRating">-</span>점
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ================= Widgets ================= -->
                <div class="row">
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card text-white bg-primary shadow-sm h-100">
                            <div class="card-body">
                                <div class="small mb-1">총 매출</div>
                                <div class="fs-4 fw-bold" id="totalSales">-</div>
                                <div class="small mt-2">오늘 매출 <span id="todaySales">-</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-body">
                                <div class="text-muted small mb-2">주문 처리 현황</div>
                                <div class="d-flex justify-content-between small mb-1">
                                    <span><span class="badge bg-warning me-1">준비중</span></span>
                                    <span class="fw-bold" id="pendingOrder">-</span>
                                </div>
                                <div class="d-flex justify-content-between small mb-1">
                                    <span><span class="badge bg-info me-1">배송중</span></span>
                                    <span class="fw-bold" id="shippingOrder">-</span>
                                </div>
                                <div class="d-flex justify-content-between small">
                                    <span><span class="badge bg-success me-1">배송완료</span></span>
                                    <span class="fw-bold" id="completeOrder">-</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card text-white bg-warning shadow-sm h-100">
                            <div class="card-body">
                                <div class="small mb-1"><i class="fas fa-triangle-exclamation me-1"></i>재고 부족 상품</div>
                                <div class="fs-3 fw-bold" id="widgetLimitStockProduct">-</div>
                                <div class="small mt-2">재고 5개 이하</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 mb-4">
                        <div class="card text-white bg-danger shadow-sm h-100">
                            <div class="card-body">
                                <div class="small mb-1"><i class="fas fa-box-open me-1"></i>품절 상품</div>
                                <div class="fs-3 fw-bold" id="outStockProduct">-</div>
                                <div class="small mt-2">재고 0개</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ================= Charts ================= -->
                <div class="row">
                    <div class="col-lg-4 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header">
                                <i class="fas fa-star me-1"></i> 리뷰 평점 분포
                            </div>
                            <div class="card-body">
                                <canvas id="ratingChart" height="220"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header">
                                <i class="fas fa-users me-1"></i> 고객 상태 분포
                            </div>
                            <div class="card-body">
                                <canvas id="customerStatusChart" height="220"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header">
                                <i class="fas fa-tags me-1"></i> 상품 카테고리 분포
                            </div>
                            <div class="card-body">
                                <canvas id="categoryChart" height="220"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ================= 최근 주문 목록 ================= -->
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="fas fa-receipt me-1"></i> 최근 주문 10건
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead>
                            <tr>
                                <th style="width: 160px;">주문번호</th>
                                <th style="width: 140px;">고객명</th>
                                <th>상품명</th>
                                <th class="text-end" style="width: 130px;">금액</th>
                                <th class="text-center" style="width: 100px;">상태</th>
                            </tr>
                            </thead>
                            <tbody id="recentOrdersBody">
                            <tr><td colspan="5" class="text-center">불러오는 중...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="common/fragments :: footer"></footer>
    </div>
</div>

<div th:replace="common/fragments :: common-scripts"></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" crossorigin="anonymous"></script>

<style>
    /* Summary 카드 5개를 한 줄에 고르게 배치하기 위한 커스텀 컬럼 */
    .col-xl-2-4 {
        position: relative;
        width: 100%;
        padding-right: 12px;
        padding-left: 12px;
    }
    @media (min-width: 1200px) {
        .col-xl-2-4 {
            flex: 0 0 20%;
            max-width: 20%;
        }
    }
    .border-start-primary { border-left: 4px solid #0d6efd; }
    .border-start-info { border-left: 4px solid #0dcaf0; }
    .border-start-warning { border-left: 4px solid #ffc107; }
    .border-start-success { border-left: 4px solid #198754; }
    .border-start-secondary { border-left: 4px solid #6c757d; }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {

        // 상태 한글 라벨 매핑
        const customerStatusLabels = {
            ACTIVE: '활성',
            INACTIVE: '비활성',
            SUSPENDED: '정지'
        };

        const categoryLabels = {
            ELECTRONICS: '전자기기',
            FASHION: '패션',
            FOOD: '식품',
            ELSE: '기타'
        };

        const orderStatusLabels = {
            PENDING: '준비중',
            SHIPPING: '배송중',
            COMPLETED: '배송완료',
            CANCELED: '취소'
        };

        const orderStatusBadgeClasses = {
            PENDING: 'bg-warning',
            SHIPPING: 'bg-info',
            COMPLETED: 'bg-success',
            CANCELED: 'bg-secondary'
        };

        // ================= 데이터 로드 (4개 API 병렬 호출) =================
        Promise.all([
            fetch('/dashboard/summary').then(res => res.json()),
            fetch('/dashboard/widgets').then(res => res.json()),
            fetch('/dashboard/charts').then(res => res.json()),
            fetch('/dashboard/orders').then(res => res.json())
        ])
            .then(([summaryRes, widgetsRes, chartsRes, ordersRes]) => {
                renderSummary(summaryRes.data);
                renderWidgets(widgetsRes.data);
                renderCharts(chartsRes.data);
                renderRecentOrders(ordersRes.data.orders);
            })
            .catch(error => {
                console.error('Error loading dashboard:', error);
                alert('대시보드 데이터를 불러오는데 실패했습니다.');
            });

        // ================= Summary 렌더링 =================
        function renderSummary(summary) {
            document.getElementById('totalAdmin').textContent = summary.totalAdmin;
            document.getElementById('activeAdmin').textContent = summary.activeAdmin;
            document.getElementById('totalCustomer').textContent = summary.totalCustomer;
            document.getElementById('activeCustomer').textContent = summary.activeCustomer;
            document.getElementById('totalProduct').textContent = summary.totalProduct;
            document.getElementById('summaryLimitStockProduct').textContent = summary.limitStockProduct;
            document.getElementById('totalOrder').textContent = summary.totalOrder;
            document.getElementById('todayOrder').textContent = summary.todayOrder;
            document.getElementById('totalReview').textContent = summary.totalReview;
            document.getElementById('averageRating').textContent =
                (summary.averageRating ?? 0).toFixed(1);
        }

        // ================= Widgets 렌더링 =================
        function renderWidgets(widgets) {
            document.getElementById('totalSales').textContent = formatCurrency(widgets.totalSales);
            document.getElementById('todaySales').textContent = formatCurrency(widgets.todaySales);
            document.getElementById('pendingOrder').textContent = widgets.pendingOrder;
            document.getElementById('shippingOrder').textContent = widgets.shippingOrder;
            document.getElementById('completeOrder').textContent = widgets.completeOrder;
            document.getElementById('widgetLimitStockProduct').textContent = widgets.limitStockProduct;
            document.getElementById('outStockProduct').textContent = widgets.outStockProduct;
        }

        function formatCurrency(value) {
            return `${Number(value ?? 0).toLocaleString()}원`;
        }

        // ================= Charts 렌더링 =================
        function renderCharts(charts) {
            renderRatingChart(charts.ratingDistribution);
            renderCustomerStatusChart(charts.customerStatusDistribution);
            renderCategoryChart(charts.categoryDistribution);
        }

        // 리뷰 평점 분포 (5점 -> 1점 순서, 막대그래프)
        function renderRatingChart(ratingDistribution) {
            const countMap = {};
            (ratingDistribution ?? []).forEach(item => {
                countMap[item.rating] = item.count;
            });

            const labels = [5, 4, 3, 2, 1].map(r => `${r}점`);
            const data = [5, 4, 3, 2, 1].map(r => countMap[r] ?? 0);

            new Chart(document.getElementById('ratingChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '리뷰 수',
                        data: data,
                        backgroundColor: '#ffc107'
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
                }
            });
        }

        // 고객 상태 분포 (도넛)
        function renderCustomerStatusChart(customerStatusDistribution) {
            const labels = (customerStatusDistribution ?? [])
                .map(item => customerStatusLabels[item.status] ?? item.status);
            const data = (customerStatusDistribution ?? []).map(item => item.count);

            new Chart(document.getElementById('customerStatusChart'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#198754', '#6c757d', '#dc3545', '#0dcaf0']
                    }]
                },
                options: {
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        // 상품 카테고리 분포 (도넛)
        function renderCategoryChart(categoryDistribution) {
            const labels = (categoryDistribution ?? [])
                .map(item => categoryLabels[item.category] ?? item.category);
            const data = (categoryDistribution ?? []).map(item => item.count);

            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#0d6efd', '#fd7e14', '#20c997', '#6f42c1']
                    }]
                },
                options: {
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        }

        // ================= 최근 주문 목록 렌더링 =================
        function renderRecentOrders(orders) {
            const tbody = document.getElementById('recentOrdersBody');

            if (!orders || orders.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center">최근 주문이 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = orders.map(order => {
                const statusLabel = orderStatusLabels[order.status] ?? order.status;
                const statusBadgeClass = orderStatusBadgeClasses[order.status] ?? 'bg-secondary';

                return `
                <tr>
                    <td>${order.orderNumber}</td>
                    <td>${order.customerName}</td>
                    <td>${order.productName}</td>
                    <td class="text-end">${Number(order.totalPrice ?? 0).toLocaleString()}원</td>
                    <td class="text-center"><span class="badge ${statusBadgeClass}">${statusLabel}</span></td>
                </tr>
            `;
            }).join('');
        }
    });
</script>
</body>
</html>
