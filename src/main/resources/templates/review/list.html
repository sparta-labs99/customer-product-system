<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="common/fragments :: common-head">
</head>
<body class="sb-nav-fixed">

<nav th:replace="common/fragments :: top-nav"></nav>

<div id="layoutSidenav">
    <div th:replace="common/fragments :: side-nav"></div>

    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <h1 class="mt-4 mb-4">리뷰 관리</h1>
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row mb-3 align-items-center">

                            <!-- 왼쪽: 순수 관측 영역 (갯수 선택 & 카운터) -->
                            <div class="col-md-5 d-flex align-items-center gap-2">
                                <select id="sizeSelect" class="form-select form-select-sm shadow-sm" style="width: 125px; cursor: pointer; height: 31px;">
                                    <option value="5">5개씩 보기</option>
                                    <option value="10" selected>10개씩 보기</option>
                                    <option value="25">25개씩 보기</option>
                                </select>

                                <div class="d-flex align-items-center bg-light border rounded px-2 shadow-sm text-secondary" style="height: 31px; font-size: 0.85rem;">
                                    <span class="fw-bold text-dark" id="totalCount">0 / 0</span>
                                    <span class="ms-1 text-muted">건</span>
                                </div>
                            </div>

                            <!-- 오른쪽: 액션 영역 (평점 필터 + 상태 필터 + 검색창 + 선택 삭제 버튼) -->
                            <div class="col-md-7 d-flex justify-content-end align-items-center gap-2">
                                <!-- 1. 평점 필터 -->
                                <select id="ratingSelect" class="form-select form-select-sm shadow-sm" style="width: 110px; cursor: pointer; height: 31px;">
                                    <option value="">전체 평점</option>
                                    <option value="5">5점</option>
                                    <option value="4">4점</option>
                                    <option value="3">3점</option>
                                    <option value="2">2점</option>
                                    <option value="1">1점</option>
                                </select>

                                <!-- 2. 상태 필터 -->
                                <select id="statusSelect" class="form-select form-select-sm shadow-sm" style="width: 110px; cursor: pointer; height: 31px;">
                                    <option value="">전체 상태</option>
                                    <option value="NORMAL">정상</option>
                                    <option value="DELETED">삭제됨</option>
                                </select>

                                <!-- 3. 검색창 그룹 -->
                                <div class="input-group input-group-sm shadow-sm" style="width: 240px; height: 31px;">
                                    <input type="text" id="keywordInput" class="form-control" placeholder="리뷰 내용 검색" style="height: 31px;">
                                    <button class="btn btn-primary d-flex align-items-center" id="searchBtn" type="button" style="height: 31px;">
                                        <i class="fas fa-search me-1"></i> 검색
                                    </button>
                                </div>

                                <!-- 4. 맨 오른쪽에 위치한 선택 삭제 버튼 -->
                                <button class="btn btn-danger btn-sm shadow-sm d-flex align-items-center gap-1 text-nowrap" id="deleteCheckedBtn" type="button" style="height: 31px; font-size: 0.85rem;">
                                    <i class="fas fa-trash-alt"></i> 선택삭제
                                </button>
                            </div>

                        </div>
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover align-middle text-nowrap">
                                <thead>
                            <tr>
                                <!-- 1. 맨 앞: 전체 선택 체크박스 -->
                                <th class="text-center" style="width: 50px;">
                                    <input class="form-check-input" type="checkbox" id="selectAll">
                                </th>
                                <th class="text-center" style="width: 70px;">ID</th>
                                <th style="width: 160px;">상품명</th>
                                <th class="text-center" style="width: 100px;">카테고리</th>
                                <th class="text-center" style="width: 90px;">평점</th>
                                <th>리뷰 내용</th>
                                <th style="width: 120px;">작성자</th>
                                <th class="text-center" style="width: 130px;">등록일</th>
                                <th class="text-center" style="width: 130px;">수정일</th>
                                <th class="text-center" style="width: 100px;">상품 보기</th>
                            </tr>
                            </thead>
                            <tbody>
                            <!-- JS가 이 곳에 데이터를 동적으로 채웁니다 -->
                            </tbody>
                        </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="common/fragments :: footer"></footer>
    </div>
</div>

<div th:replace="common/fragments :: common-scripts"></div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. DOM 요소 선택
        const tbody = document.querySelector('table tbody');
        const sizeSelect = document.getElementById('sizeSelect');
        const ratingSelect = document.getElementById('ratingSelect');
        const statusSelect = document.getElementById('statusSelect');
        const keywordInput = document.getElementById('keywordInput');
        const searchBtn = document.getElementById('searchBtn');
        const currentPageCountSpan = document.getElementById('totalCount');
        const deleteCheckedBtn = document.getElementById('deleteCheckedBtn');

        // 상태 한글 라벨 매핑
        const statusLabels = {
            NORMAL: '정상',
            DELETED: '삭제됨'
        };

        // 카테고리 한글 라벨 매핑
        const categoryLabels = {
            ELECTRONICS: '전자기기',
            FASHION: '패션',
            FOOD: '식품',
            ELSE: '기타'
        };

        // 페이지네이션 영역 생성
        let paginationArea = document.querySelector('.pagination');
        if (!paginationArea) {
            paginationArea = document.createElement('ul');
            paginationArea.className = 'pagination justify-content-center mt-4';
            document.querySelector('.card-body').appendChild(paginationArea);
        }

        // 2. 메인 데이터 로드 함수
        window.loadReviews = function(page = 1) {
            const params = new URLSearchParams({
                page: page - 1,
                size: sizeSelect.value
            });

            if (keywordInput.value.trim()) params.append('keyword', keywordInput.value.trim());
            if (ratingSelect.value) params.append('rating', ratingSelect.value);
            if (statusSelect.value) params.append('status', statusSelect.value);

            fetch(`/reviews?${params.toString()}`)
                .then(res => {
                    if (!res.ok) throw new Error('Network response was not ok');
                    return res.json();
                })
                .then(apiResponse => {
                    const data = apiResponse.data; // ApiResponse 래핑 해제
                    currentPageCountSpan.textContent = `${data.numberOfElements} / ${data.totalElements}`;
                    renderTable(data.content);
                    renderPagination(data.totalPages, data.number);
                })
                .catch(error => {
                    console.error('Error fetching reviews:', error);
                    alert('데이터를 불러오는데 실패했습니다.');
                });
        };

        // 3. 테이블 렌더링 함수
        function renderTable(reviews) {
            if (!reviews || reviews.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="text-center">데이터가 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = reviews.map(review => {
                const formattedCreateDate = (review.createdAt ?? '').toString().substring(0, 10);
                const formattedUpdateDate = (review.modifiedAt ?? '').toString().substring(0, 10);
                const statusLabel = statusLabels[review.status] ?? review.status;
                const categoryLabel = categoryLabels[review.productCategory] ?? review.productCategory;

                return `
                <tr data-id="${review.id}">
                    <td class="text-center">
                        <input class="form-check-input row-checkbox" type="checkbox" value="${review.id}">
                    </td>
                    <td class="text-center">${review.id}</td>
                    <td>${review.productName}</td>
                    <td class="text-center">${categoryLabel}</td>
                    <td class="text-center">${review.rating}점</td>
                    <td>${review.contents}</td>
                    <td>${review.customerName}</td>
                    <td class="text-center">${formattedCreateDate}</td>
                    <td class="text-center">${formattedUpdateDate}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary" onclick="viewProduct(${review.productId})">
                            상품보기
                        </button>
                    </td>
                </tr>
            `;
            }).join('');
        }

        // 4. 페이지네이션 렌더링 함수
        function renderPagination(totalPages, number) {
            if (totalPages <= 0) {
                paginationArea.innerHTML = '';
                return;
            }

            const currentPage = number + 1; // 스프링 API(0-based)를 프론트(1-based)로 변환
            let html = '';

            html += `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="if(${currentPage} > 1) window.loadReviews(${currentPage - 1});">이전</a>
            </li>
        `;

            for (let i = 1; i <= totalPages; i++) {
                html += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="window.loadReviews(${i});">${i}</a>
                </li>
            `;
            }

            html += `
            <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="if(${currentPage} < ${totalPages}) window.loadReviews(${currentPage + 1});">다음</a>
            </li>
        `;

            paginationArea.innerHTML = html;
        }

        // 5. 이벤트 리스너 등록
        searchBtn.addEventListener('click', () => loadReviews(1));
        keywordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadReviews(1);
        });
        ratingSelect.addEventListener('change', () => loadReviews(1));
        statusSelect.addEventListener('change', () => loadReviews(1));
        sizeSelect.addEventListener('change', () => loadReviews(1));

        // 6. 초기 데이터 로딩
        loadReviews(1);

        // 상품 보기 버튼 -> 상품 상세 페이지로 이동
        window.viewProduct = function(productId) {
            window.location.href = `/view/products/${productId}`;
        };

        // 체크박스 선택
        const selectAllCheckbox = document.getElementById('selectAll');
        if (selectAllCheckbox) {
            selectAllCheckbox.addEventListener('change', function() {
                const rowCheckboxes = document.querySelectorAll('.row-checkbox');
                rowCheckboxes.forEach(cb => cb.checked = selectAllCheckbox.checked);
            });
        }

        if (deleteCheckedBtn) {
            deleteCheckedBtn.addEventListener('click', function() {
                const checkedBoxes = document.querySelectorAll('.row-checkbox:checked');

                if (checkedBoxes.length === 0) {
                    alert('삭제할 리뷰를 선택해 주세요.');
                    return;
                }

                const idsToDelete = Array.from(checkedBoxes).map(cb => cb.value);

                if (!confirm(`선택한 ${checkedBoxes.length}개의 리뷰를 정말 삭제하시겠습니까?\n(선택된 리뷰 ID: ${idsToDelete.join(', ')})`)) {
                    return;
                }

                deleteCheckedBtn.disabled = true;

                fetch('/reviews', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(idsToDelete.map(Number))
                })
                    .then(async res => {
                        if (!res.ok) {
                            const errorBody = await res.json().catch(() => null);
                            throw new Error(errorBody?.message ?? '삭제 요청이 실패했습니다.');
                        }
                        alert(`선택한 ${idsToDelete.length}개의 리뷰가 삭제되었습니다.`);

                        const selectAllCheckbox = document.getElementById('selectAll');
                        if (selectAllCheckbox) selectAllCheckbox.checked = false;

                        loadReviews(1);
                    })
                    .catch(error => {
                        console.error('Error deleting reviews:', error);
                        alert(error.message);
                    })
                    .finally(() => {
                        deleteCheckedBtn.disabled = false;
                    });
            });
        }
    });
</script>
</body>
</html>
